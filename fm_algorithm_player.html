<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIT-15: FM ALGORITHM PLAYER [PASTE ENABLED]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        :root { --fm-neon: #00ff41; --bg: #0d0208; --dim: #003b00; }
        body { background-color: var(--bg); color: var(--fm-neon); font-family: 'Share Tech Mono', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .player-box { border: 2px solid var(--fm-neon); padding: 20px; width: 90%; max-width: 700px; background: rgba(0, 255, 65, 0.02); box-shadow: 0 0 20px var(--dim); position: relative; margin-bottom: 20px; }
        .header { border-bottom: 1px solid var(--fm-neon); margin-bottom: 15px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .viz-large { width: 100%; height: 80px; background: #000; border: 1px solid var(--dim); margin-bottom: 15px; display: flex; align-items: flex-end; gap: 2px; padding: 5px; box-sizing: border-box; }
        .v-bar { flex: 1; background: var(--fm-neon); height: 0%; transition: height 0.1s; }

        .info-panel { font-size: 0.9em; margin-bottom: 15px; min-height: 50px; border-left: 3px solid var(--fm-neon); padding-left: 15px; }
        .song-title { color: #fff; font-size: 1.1em; display: block; }
        .status { font-size: 0.7em; color: var(--dim); text-transform: uppercase; }

        .paste-section { margin-bottom: 15px; }
        textarea { width: 100%; height: 80px; background: #000; border: 1px solid var(--dim); color: var(--fm-neon); font-family: 'Share Tech Mono'; font-size: 10px; padding: 5px; box-sizing: border-box; resize: none; }
        textarea:focus { border-color: var(--fm-neon); outline: none; }

        .controls { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { background: transparent; border: 1px solid var(--fm-neon); color: var(--fm-neon); padding: 10px; cursor: pointer; font-family: 'Share Tech Mono'; flex: 1; transition: all 0.2s; font-size: 0.8em; }
        .btn:hover { background: var(--fm-neon); color: #000; }
        .btn:disabled { border-color: var(--dim); color: var(--dim); cursor: not-allowed; }
        .btn-inject { background: rgba(0, 255, 65, 0.1); border-width: 2px; font-weight: bold; }

        #drop-zone { border: 1px dashed var(--dim); padding: 5px; text-align: center; font-size: 0.6em; margin-bottom: 10px; cursor: pointer; color: var(--dim); }
        #drop-zone:hover { border-color: var(--fm-neon); color: var(--fm-neon); }

        .footer { width: 100%; text-align: center; margin-bottom: 20px; }
        .back-link { color: var(--fm-neon); text-decoration: none; border: 1px solid var(--fm-neon); padding: 5px 15px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="player-box">
        <div class="header">
            <span style="font-weight:bold;">UNIT-15: ALGORITHM_PLAYER_v1.1</span>
            <span id="time-display">00:00</span>
        </div>

        <div class="paste-section">
            <span style="font-size:0.7em; color:#fff;">PASTE JSON ALGORITHM HERE:</span>
            <textarea id="json-input" placeholder='{"tracks": [...], "emotions": {...}}'></textarea>
            <button class="btn btn-inject" onclick="injectFromText()">INJECT & RESONATE</button>
        </div>

        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            OR DROP JSON FILE / CLICK TO LOAD
            <input type="file" id="file-input" style="display:none" onchange="handleFile(event)">
        </div>

        <div class="viz-large" id="viz"></div>

        <div class="info-panel">
            <span id="current-song" class="song-title">AWAITING INPUT</span>
            <span id="current-status" class="status">Waiting for algorithm injection...</span>
        </div>

        <div class="controls">
            <button id="play-btn" class="btn" onclick="togglePlayback()" disabled>PLAY / PAUSE</button>
            <button class="btn" onclick="stopPlayback()">STOP</button>
            <button class="btn" onclick="document.getElementById('json-input').value='';">CLEAR</button>
        </div>
    </div>

    <div class="footer">
        <a href="arcade.html" class="back-link">EXIT TO ARCADE</a>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const mainGain = audioCtx.createGain();
        mainGain.connect(audioCtx.destination);
        mainGain.gain.value = 0.4;

        const frequencies = {
            'C3': 130.81, 'D3': 146.83, 'E3': 164.81, 'F3': 174.61, 'G3': 196.00, 'A3': 220.00, 'B3': 246.94,
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23, 'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
            'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46, 'G5': 783.99, 'A5': 880.00, 'B5': 987.77, 'C6': 1046.50
        };

        let currentData = null;
        let isPlaying = false;
        let timers = [];
        let startTime = 0;
        let pauseOffset = 0;

        // Init Viz
        const viz = document.getElementById('viz');
        const bars = [];
        for(let i=0; i<60; i++) {
            const b = document.createElement('div');
            b.className = 'v-bar';
            viz.appendChild(b);
            bars.push(b);
        }

        function injectFromText() {
            const text = document.getElementById('json-input').value;
            if(!text.trim()) return;
            try {
                const json = JSON.parse(text);
                processData(json, "PASTED_ALGORITHM");
                startPlayback();
            } catch(e) {
                alert("JSON PARSE ERROR: Check your algorithm structure.");
            }
        }

        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const json = JSON.parse(event.target.result);
                    processData(json, file.name.toUpperCase());
                } catch(err) { alert("INVALID FILE DATA"); }
            };
            reader.readAsText(file);
        }

        function processData(json, name) {
            if (Array.isArray(json)) {
                currentData = {
                    tracks: json,
                    emotions: {
                        joy: { tempo: 140, rhythm: [1, 0.5, 0.5, 1] },
                        anger: { tempo: 180, rhythm: [0.25, 0.25, 0.25, 0.25] },
                        sorrow: { tempo: 60, rhythm: [2, 1, 1] },
                        pleasure: { tempo: 110, rhythm: [1.5, 0.5, 1.5, 0.5] }
                    }
                };
            } else {
                currentData = json;
            }
            document.getElementById('current-song').innerText = name;
            document.getElementById('current-status').innerText = "Algorithm verified. Ready.";
            document.getElementById('play-btn').disabled = false;
            stopPlayback();
        }

        function playFM(note, fmParams) {
            if(!frequencies[note]) return;
            const freq = frequencies[note];
            const carrier = audioCtx.createOscillator();
            const modulator = audioCtx.createOscillator();
            const modGain = audioCtx.createGain();
            const env = audioCtx.createGain();

            carrier.type = 'sine'; carrier.frequency.value = freq;
            modulator.type = 'sine'; modulator.frequency.value = freq * fmParams.ratio;
            modGain.gain.value = fmParams.depth;

            env.gain.setValueAtTime(0.2, audioCtx.currentTime);
            env.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + fmParams.rel);

            modulator.connect(modGain); modGain.connect(carrier.frequency);
            carrier.connect(env); env.connect(mainGain);

            modulator.start(); carrier.start();
            modulator.stop(audioCtx.currentTime + fmParams.rel);
            carrier.stop(audioCtx.currentTime + fmParams.rel);
            animateViz();
        }

        function animateViz() {
            bars.forEach(b => {
                if(Math.random() > 0.6) b.style.height = Math.random()*100 + "%";
                setTimeout(() => b.style.height = "0%", 150);
            });
        }

        function togglePlayback() {
            if(isPlaying) { stopPlayback(); } 
            else { startPlayback(); }
        }

        function startPlayback() {
            audioCtx.resume();
            isPlaying = true;
            startTime = Date.now() - pauseOffset;
            document.getElementById('play-btn').innerText = "PAUSE RESONANCE";
            document.getElementById('current-status').innerText = "FM RESONANCE ACTIVE...";
            
            currentData.tracks.forEach((t, i) => {
                if(!t.step) t.step = 0;
                playTrack(i);
            });
            updateTimer();
        }

        function playTrack(idx) {
            if(!isPlaying) return;
            const t = currentData.tracks[idx];
            const emo = currentData.emotions[t.emotion];
            const note = t.sequence[t.step % t.sequence.length];
            const interval = (60 / emo.tempo) * emo.rhythm[t.step % emo.rhythm.length] * 1000;

            if(note) playFM(note, t.fm);
            
            t.step++;
            const timer = setTimeout(() => playTrack(idx), interval);
            timers.push(timer);
        }

        function stopPlayback() {
            isPlaying = false;
            pauseOffset = 0;
            timers.forEach(clearTimeout);
            timers = [];
            if(currentData) currentData.tracks.forEach(t => t.step = 0);
            document.getElementById('play-btn').innerText = "START RESONANCE";
            document.getElementById('current-status').innerText = "Resonance suspended.";
            document.getElementById('time-display').innerText = "00:00";
        }

        function updateTimer() {
            if(!isPlaying) return;
            const sec = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            document.getElementById('time-display').innerText = `${m}:${s}`;
            setTimeout(updateTimer, 1000);
        }
    </script>
</body>
</html>
