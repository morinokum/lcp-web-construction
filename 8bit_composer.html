<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIT-11: 8-BIT EMOTION COMPOSER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body {
            background-color: #0d0208;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh;
        }
        .header { border-bottom: 2px solid #00ff41; width: 100%; padding-bottom: 10px; margin-bottom: 30px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; max-width: 600px; margin-bottom: 40px; }
        .emotion-btn {
            background: transparent; border: 2px solid #00ff41; color: #00ff41;
            padding: 20px; cursor: pointer; font-size: 1.5em; transition: 0.2s;
        }
        .emotion-btn:hover { background: rgba(0, 255, 65, 0.1); }
        .emotion-btn.active { background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }

        .piano-roll { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .note-btn {
            background: transparent; border: 1px solid #003b00; color: #00ff41;
            width: 60px; height: 60px; cursor: pointer; font-size: 1em; display: flex; align-items: center; justify-content: center;
        }
        .note-btn:hover { border-color: #00ff41; }
        .note-btn:active { background: #00ff41; color: #000; }

        .visualizer { width: 100%; height: 100px; border: 1px solid #003b00; margin-top: 40px; display: flex; align-items: flex-end; gap: 2px; }
        .bar { background: #00ff41; flex-grow: 1; transition: height 0.1s; }

        .controls { margin-top: 30px; display: flex; gap: 20px; }
        .btn { background: transparent; color: #0fc; border: 1px solid #0fc; padding: 10px 20px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>8-BIT_EMOTION_COMPOSER_v1.0</h1>
        <p>SELECT EMOTION BASE & INJECT NOTES</p>
    </div>

    <div class="grid">
        <button id="joy" class="emotion-btn" onclick="setEmotion('joy')">喜 (JOY)</button>
        <button id="anger" class="emotion-btn" onclick="setEmotion('anger')">怒 (ANGER)</button>
        <button id="sorrow" class="emotion-btn" onclick="setEmotion('sorrow')">哀 (SORROW)</button>
        <button id="pleasure" class="emotion-btn" onclick="setEmotion('pleasure')">楽 (PLEASURE)</button>
    </div>

    <div class="piano-roll">
        <button class="note-btn" onclick="playNote('C4')">DO</button>
        <button class="note-btn" onclick="playNote('D4')">RE</button>
        <button class="note-btn" onclick="playNote('E4')">MI</button>
        <button class="note-btn" onclick="playNote('F4')">FA</button>
        <button class="note-btn" onclick="playNote('G4')">SO</button>
        <button class="note-btn" onclick="playNote('A4')">LA</button>
        <button class="note-btn" onclick="playNote('B4')">SI</button>
        <button class="note-btn" onclick="playNote('C5')">DO^</button>
    </div>

    <div id="visualizer" class="visualizer"></div>

    <div class="controls">
        <button id="play-stop" class="btn" onclick="togglePlayback()">START EMOTION SYNC</button>
        <a href="arcade.html" class="btn">BACK TO ARCADE</a>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isPlaying = false;
        let currentEmotion = 'joy';
        let sequence = [];
        let step = 0;
        let timer = null;

        const emotions = {
            joy: { tempo: 140, rhythm: [1, 0.5, 0.5, 1], color: "#00ff41" },
            anger: { tempo: 180, rhythm: [0.25, 0.25, 0.25, 0.25], color: "#ff0000" },
            sorrow: { tempo: 60, rhythm: [2, 1, 1], color: "#0000ff" },
            pleasure: { tempo: 110, rhythm: [1.5, 0.5, 1.5, 0.5], color: "#f0f" }
        };

        const frequencies = {
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
            'G4': 392.00, 'A4': 440.00, 'B4': 493.88, 'C5': 523.25
        };

        // Create Visualizer Bars
        const viz = document.getElementById('visualizer');
        for(let i=0; i<32; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = '0%';
            viz.appendChild(bar);
        }

        function setEmotion(e) {
            currentEmotion = e;
            document.querySelectorAll('.emotion-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(e).classList.add('active');
            if (isPlaying) {
                togglePlayback();
                togglePlayback();
            }
        }

        function playNote(note, duration = 0.2) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'square'; // FAMICOM SOUND
            osc.frequency.setValueAtTime(frequencies[note], audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);

            updateVisualizer();
            
            if (isPlaying) {
                sequence.push(note);
                if (sequence.length > 16) sequence.shift();
            }
        }

        function updateVisualizer() {
            const bars = document.querySelectorAll('.bar');
            bars.forEach(bar => {
                bar.style.height = Math.random() * 100 + "%";
                setTimeout(() => bar.style.height = "0%", 100);
            });
        }

        function togglePlayback() {
            if (isPlaying) {
                isPlaying = false;
                clearTimeout(timer);
                document.getElementById('play-stop').innerText = "START EMOTION SYNC";
            } else {
                isPlaying = true;
                step = 0;
                playSequence();
                document.getElementById('play-stop').innerText = "STOP SYNC";
            }
        }

        function playSequence() {
            if (!isPlaying) return;

            const emo = emotions[currentEmotion];
            const rhythmIdx = step % emo.rhythm.length;
            const nextInterval = (60 / emo.tempo) * emo.rhythm[rhythmIdx] * 1000;

            if (sequence.length > 0) {
                const note = sequence[step % sequence.length];
                playNote(note, nextInterval / 1000);
            }

            step++;
            timer = setTimeout(playSequence, nextInterval);
        }

        setEmotion('joy');
    </script>
</body>
</html>
