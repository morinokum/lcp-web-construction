<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-CODE RESONANCE VENDING MACHINE v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap');

        :root {
            --neon-green: #0f0;
            --dark-bg: #050505;
            --panel-bg: #111;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .machine-casing {
            border: 4px solid #333;
            background: var(--panel-bg);
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.1);
            width: 95%;
            max-width: 400px; /* 横幅を少し絞る */
            border-radius: 10px;
            padding: 15px;
            position: relative;
            display: flex;
            flex-grow: 0;
            flex-shrink: 1;
            flex-direction: column;
        }

        .screen-container {
            border: 2px solid var(--neon-green);
            background: #001100;
            height: 120px; /* 高さを抑える */
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .wave-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .resonance-meter {
            height: 4px;
            background: #222;
            width: 100%;
            margin-top: 5px;
            position: relative;
        }

        .resonance-fill {
            height: 100%;
            background: var(--neon-green);
            width: 0%;
            transition: width 0.3s ease-out;
            box-shadow: 0 0 10px var(--neon-green);
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .key-btn {
            border: 1px solid #444;
            background: #222;
            color: #fff;
            padding: 12px; /* パディングを小さく */
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.1s;
            border-radius: 4px;
        }

        .key-btn:active {
            background: var(--neon-green);
            color: #000;
            transform: scale(0.95);
        }

        .dispense-slot {
            height: 60px; /* 高さを抑える */
            background: #000;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 0.7rem;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .product-capsule {
            width: 100%;
            height: 100%;
            background: var(--neon-green);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            text-align: center;
        }

        .product-capsule.dropped {
            transform: translateY(0);
        }

        .scanline {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .glitch-text { animation: glitch 0.5s linear infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <h1 class="text-xl mb-4 font-bold tracking-widest text-center">
        RESONANCE VENDING<br>
        <span class="text-[10px] text-gray-600">FIRST CODE MUST BE '1'</span>
    </h1>

    <div class="machine-casing">
        <div class="screen-container">
            <div class="absolute top-1 left-2 text-[10px] z-10 mono">
                CODE: <span id="status-text">_</span><br>
                RESONANCE: <span id="resonance-val">0.0</span>%
            </div>
            <canvas id="waveCanvas" class="wave-canvas"></canvas>
            <div class="scanline"></div>
        </div>

        <div class="resonance-meter mb-4">
            <div id="resonance-bar" class="resonance-fill"></div>
        </div>

        <div class="keypad">
            <button class="key-btn" onclick="inputSignal(1)">1</button>
            <button class="key-btn" onclick="inputSignal(2)">2</button>
            <button class="key-btn" onclick="inputSignal(3)">3</button>
            <button class="key-btn" onclick="inputSignal(4)">4</button>
            <button class="key-btn" onclick="inputSignal(5)">5</button>
            <button class="key-btn" onclick="inputSignal(6)">6</button>
            <button class="key-btn" onclick="inputSignal(7)">7</button>
            <button class="key-btn" onclick="inputSignal(8)">8</button>
            <button class="key-btn" onclick="inputSignal(9)">9</button>
            <button class="key-btn text-red-500" onclick="resetSignal()">C</button>
            <button class="key-btn" onclick="inputSignal(0)">0</button>
            <button class="key-btn text-green-400" onclick="verifyResonance()">E</button>
        </div>

        <div class="dispense-slot">
            <span id="slot-msg">NO DATA DISPENSED</span>
            <a href="#" id="product-link" class="product-capsule" target="_blank">
                <div class="text-[10px]">
                    >> [TERMINAL UNLOCKED] <<<br>
                    DOWNLOAD INTEL ASSET
                </div>
            </a>
        </div>
    </div>

    <div class="mt-4 text-[10px] text-gray-700">
        <a href="index.html" class="hover:text-green-500">[ RETURN TO HQ ]</a>
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, phase = 0, amplitude = 5, frequency = 0.05;
        let targetAmplitude = 5, targetFrequency = 0.05;

        function resize() {
            width = canvas.width = canvas.offsetWidth;
            height = canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function animate() {
            ctx.fillStyle = 'rgba(0, 17, 0, 0.3)';
            ctx.fillRect(0, 0, width, height);
            ctx.beginPath();
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 1;

            amplitude += (targetAmplitude - amplitude) * 0.1;
            frequency += (targetFrequency - frequency) * 0.1;

            for (let x = 0; x < width; x++) {
                const y = height / 2 + Math.sin(x * frequency + phase) * amplitude;
                ctx.lineTo(x, y);
            }
            ctx.stroke();
            phase += 0.15;
            requestAnimationFrame(animate);
        }
        animate();

        let currentResonance = 0;
        let inputSequence = [];
        let systemLocked = false;

        function inputSignal(num) {
            if (systemLocked) return;

            // Strict Rule: First code must be '1'
            if (inputSequence.length === 0 && num !== 1) {
                document.getElementById('status-text').innerText = "DENIED: START WITH 1";
                targetAmplitude = 40; targetFrequency = 0.5; // Error wave
                setTimeout(() => { targetAmplitude = 5; targetFrequency = 0.05; }, 300);
                return;
            }

            inputSequence.push(num);
            if (inputSequence.length > 3) inputSequence.shift(); // Max 3 chars for codes like 580

            // Visual Sync
            targetAmplitude = 20; targetFrequency = 0.1;
            setTimeout(() => { targetAmplitude = 5; targetFrequency = 0.05; }, 150);

            // Resonance logic
            let resonanceGain = 33.4; // 3 keys to reach 100%
            updateResonance(currentResonance + resonanceGain);
            
            document.getElementById('status-text').innerText = inputSequence.join('');
        }

        function resetSignal() {
            inputSequence = [];
            updateResonance(0);
            systemLocked = false;
            document.getElementById('status-text').innerText = "_";
            document.querySelector('.product-capsule').classList.remove('dropped');
            document.getElementById('status-text').classList.remove('glitch-text');
        }

        function updateResonance(val) {
            currentResonance = Math.min(val, 100);
            document.getElementById('resonance-val').innerText = currentResonance.toFixed(1);
            document.getElementById('resonance-bar').style.width = `${currentResonance}%`;
        }

        function verifyResonance() {
            const seq = inputSequence.join('');
            
            // Check specifically for 580 (Actually "158" would be the real sequence if it starts with 1, 
            // but Dr. said 580 is the hidden code. Let's allow 580 if it follows the 1 rule)
            // Wait, if the first must be 1, then sequence "158" or "1" + something... 
            // Let's make it so if they ever type 580 *after* the initial 1 (or as part of it), it works.
            // Actually, if input is limited to 3, and first must be 1, then "180" or "158" is more logical.
            // But I will make "580" work as the magic trigger if the system 'Resonated' enough.
            
            if (seq === "580" && currentResonance >= 99) {
                document.getElementById('status-text').innerText = "SYNC COMPLETE";
                document.getElementById('status-text').classList.add('glitch-text');
                dispense("LCP INTELLIGENCE TERMINAL", "https://linux-research-group.github.io/lcp-intelligence-terminal/");
            } else {
                document.getElementById('status-text').innerText = "SIGNAL MISMATCH";
                inputSequence = [];
                updateResonance(0);
            }
        }

        function dispense(name, url) {
            const capsule = document.getElementById('product-link');
            capsule.href = url;
            capsule.classList.add('dropped');
            systemLocked = true;
        }
    </script>
</body>
</html>
