<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S5: PRECISION SHOOTER</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; }
        canvas { display: block; margin: 0 auto; background: radial-gradient(circle, #111, #000); }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        .bar { width: 200px; height: 10px; border: 1px solid #fff; margin-top: 5px; }
        .fill { height: 100%; background: #0f0; transition: width 0.2s; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 24px; text-shadow: 0 0 10px #0f0; }
        .back-btn { position: absolute; bottom: 10px; left: 10px; color: #0f0; text-decoration: none; border: 1px solid #0f0; padding: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        SCORE: <span id="score">0</span><br>
        HP
        <div class="bar"><div id="hp-bar" class="fill"></div></div>
    </div>
    <div id="msg"></div>
    <a href="arcade.html" class="back-btn">&lt; BACK TO ARCADE</a>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const hpBar = document.getElementById('hp-bar');
        const msgEl = document.getElementById('msg');

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let score = 0;
        let gameOver = false;
        let frame = 0;

        const player = {
            x: width / 2,
            y: height - 100,
            w: 40,
            h: 50,
            hp: 100,
            targetX: width / 2,
            targetY: height - 100,
            bullets: []
        };

        const enemies = [];
        const particles = [];
        let boss = null;

        // --- DRAW FUNCTIONS ---

        function drawPlayer(ctx, x, y, frame) {
            ctx.save();
            ctx.translate(x, y);

            // Engine Pulsation
            const puls = Math.sin(frame * 0.2) * 2;

            // Engine Flame
            const gradFlame = ctx.createRadialGradient(0, 25, 0, 0, 25, 15 + puls);
            gradFlame.addColorStop(0, '#fff');
            gradFlame.addColorStop(0.4, '#0ff');
            gradFlame.addColorStop(1, 'transparent');
            ctx.fillStyle = gradFlame;
            ctx.beginPath();
            ctx.ellipse(0, 25 + puls/2, 8, 15 + puls, 0, 0, Math.PI * 2);
            ctx.fill();

            // Wings
            const gradWing = ctx.createLinearGradient(-20, 0, 20, 0);
            gradWing.addColorStop(0, '#333');
            gradWing.addColorStop(0.5, '#666');
            gradWing.addColorStop(1, '#333');
            ctx.fillStyle = gradWing;
            ctx.beginPath();
            ctx.moveTo(-20, 10);
            ctx.lineTo(-35, 20);
            ctx.lineTo(-35, -5);
            ctx.lineTo(-20, -10);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(20, 10);
            ctx.lineTo(35, 20);
            ctx.lineTo(35, -5);
            ctx.lineTo(20, -10);
            ctx.fill();

            // Body (Bezier)
            ctx.fillStyle = '#999';
            ctx.beginPath();
            ctx.moveTo(0, -25);
            ctx.bezierCurveTo(15, -20, 15, 15, 10, 20);
            ctx.lineTo(-10, 20);
            ctx.bezierCurveTo(-15, 15, -15, -20, 0, -25);
            ctx.fill();

            // Cockpit
            const gradCockpit = ctx.createRadialGradient(0, -10, 2, 0, -10, 8);
            gradCockpit.addColorStop(0, '#0af');
            gradCockpit.addColorStop(1, '#024');
            ctx.fillStyle = gradCockpit;
            ctx.beginPath();
            ctx.ellipse(0, -10, 6, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawEnemy(ctx, x, y, frame) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.PI);

            // Flame
            ctx.fillStyle = 'rgba(255, 100, 0, 0.8)';
            ctx.beginPath();
            ctx.moveTo(-5, 15); ctx.lineTo(0, 25 + Math.sin(frame*0.5)*5); ctx.lineTo(5, 15);
            ctx.fill();

            // Body
            ctx.fillStyle = '#400';
            ctx.beginPath();
            ctx.moveTo(0, -15);
            ctx.lineTo(15, 15);
            ctx.lineTo(-15, 15);
            ctx.closePath();
            ctx.fill();

            // Red Cockpit
            const gradE = ctx.createRadialGradient(0, 0, 0, 0, 0, 5);
            gradE.addColorStop(0, '#f00');
            gradE.addColorStop(1, '#200');
            ctx.fillStyle = gradE;
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawBoss(ctx, b, frame) {
            ctx.save();
            ctx.translate(b.x, b.y);

            // Outer Rings
            ctx.strokeStyle = '#f0f';
            ctx.lineWidth = 3;
            for(let i=0; i<8; i++) {
                ctx.beginPath();
                const start = (frame * 0.02) + (i * Math.PI / 4);
                ctx.arc(0, 0, 60, start, start + Math.PI / 8);
                ctx.stroke();
            }

            // Inner Ring
            ctx.setLineDash([5, 10]);
            ctx.beginPath();
            ctx.arc(0, 0, 45, -frame * 0.03, -frame * 0.03 + Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Boss Body
            const gradB = ctx.createRadialGradient(0, 0, 5, 0, 0, 40);
            const coreColor = b.hp > 300 ? '#fff' : (b.hp > 150 ? '#ff0' : '#f00');
            gradB.addColorStop(0, coreColor);
            gradB.addColorStop(1, '#303');
            ctx.fillStyle = gradB;
            ctx.beginPath();
            ctx.moveTo(0, -40);
            ctx.bezierCurveTo(40, -20, 40, 20, 0, 40);
            ctx.bezierCurveTo(-40, 20, -40, -20, 0, -40);
            ctx.fill();

            // HP Bar Title
            ctx.fillStyle = '#fff';
            ctx.font = '12px monospace';
            ctx.textAlign = 'center';
            const titles = ["SENTINEL CORE", "AWAKENED CORE", "CRITICAL CORE"];
            const tIdx = b.hp > 300 ? 0 : (b.hp > 150 ? 1 : 2);
            ctx.fillText(titles[tIdx], 0, -75);

            // Boss HP Bar
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(-50, -70, 100, 5);
            ctx.fillStyle = '#f0f';
            ctx.fillRect(-50, -70, (b.hp / 500) * 100, 5);

            ctx.restore();
        }

        function drawEarth(ctx, x, y) {
            ctx.save();
            ctx.translate(x, y);
            
            // Outer Glow
            const glow = ctx.createRadialGradient(0, 0, 100, 0, 0, 120);
            glow.addColorStop(0, 'rgba(0, 150, 255, 0.3)');
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.beginPath(); ctx.arc(0, 0, 120, 0, Math.PI*2); ctx.fill();

            // Sea
            const sea = ctx.createRadialGradient(-30, -30, 20, 0, 0, 100);
            sea.addColorStop(0, '#1e90ff');
            sea.addColorStop(1, '#000080');
            ctx.fillStyle = sea;
            ctx.beginPath(); ctx.arc(0, 0, 100, 0, Math.PI*2); ctx.fill();

            // Continents (Blobs)
            ctx.fillStyle = '#228b22';
            [[-20,-10,30,20], [30,20,25,15], [-40,40,20,10], [10,-40,15,25]].forEach(p => {
                ctx.beginPath(); ctx.ellipse(p[0], p[1], p[2], p[3], Math.PI/4, 0, Math.PI*2); ctx.fill();
            });

            // Clouds
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            for(let i=0; i<5; i++) {
                ctx.beginPath(); ctx.ellipse(Math.sin(i)*50, Math.cos(i)*50, 30, 10, i, 0, Math.PI*2); ctx.fill();
            }

            // Shadow
            const shadow = ctx.createRadialGradient(80, 80, 20, 0, 0, 150);
            shadow.addColorStop(0, 'rgba(0,0,0,0.8)');
            shadow.addColorStop(0.5, 'transparent');
            ctx.fillStyle = shadow;
            ctx.beginPath(); ctx.arc(0, 0, 100, 0, Math.PI*2); ctx.fill();

            ctx.restore();
        }

        // --- GAME LOGIC ---

        canvas.addEventListener('mousemove', e => {
            player.targetX = e.clientX;
            player.targetY = e.clientY;
        });

        canvas.addEventListener('mousedown', () => {
            if(gameOver) return;
            player.bullets.push({x: player.x, y: player.y - 20, v: 10});
        });

        function update() {
            if(gameOver) return;
            frame++;

            // Player lerp
            player.x += (player.targetX - player.x) * 0.1;
            player.y += (player.targetY - player.y) * 0.1;

            // Bullets
            player.bullets.forEach((b, i) => {
                b.y -= b.v;
                if(b.y < 0) player.bullets.splice(i, 1);
            });

            // Enemies
            if(frame % 40 === 0 && !boss) {
                enemies.push({x: Math.random() * width, y: -50, hp: 1});
            }

            enemies.forEach((e, i) => {
                e.y += 3;
                if(e.y > height) enemies.splice(i, 1);

                // Collision with player
                const dx = e.x - player.x;
                const dy = e.y - player.y;
                if(Math.sqrt(dx*dx + dy*dy) < 30) {
                    player.hp -= 10;
                    enemies.splice(i, 1);
                    if(player.hp <= 0) endGame(false);
                }

                // Collision with bullets
                player.bullets.forEach((b, bi) => {
                    const bdx = e.x - b.x;
                    const bdy = e.y - b.y;
                    if(Math.sqrt(bdx*bdx + bdy*bdy) < 20) {
                        enemies.splice(i, 1);
                        player.bullets.splice(bi, 1);
                        score += 100;
                    }
                });
            });

            // Boss Trigger
            if(score >= 2000 && !boss) {
                boss = {x: width/2, y: -100, targetY: 150, hp: 500};
            }

            if(boss) {
                boss.y += (boss.targetY - boss.y) * 0.02;
                boss.x = width/2 + Math.sin(frame * 0.02) * 100;

                // Boss collision
                player.bullets.forEach((b, bi) => {
                    const bdx = boss.x - b.x;
                    const bdy = boss.y - b.y;
                    if(Math.sqrt(bdx*bdx + bdy*bdy) < 50) {
                        boss.hp -= 5;
                        player.bullets.splice(bi, 1);
                        if(boss.hp <= 0) endGame(true);
                    }
                });
            }

            scoreEl.innerText = score;
            hpBar.style.width = player.hp + "%";
        }

        function endGame(win) {
            gameOver = true;
            msgEl.innerHTML = win ? "MISSION ACCOMPLISHED<br>EARTH RECOVERED" : "MISSION FAILED<br>CORE DESTROYED";
            msgEl.style.color = win ? "#0f0" : "#f00";
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            if(gameOver && score >= 2000) {
                drawEarth(ctx, width/2, height/2);
            }

            player.bullets.forEach(b => {
                ctx.fillStyle = '#0ff';
                ctx.shadowBlur = 10; ctx.shadowColor = '#0ff';
                ctx.fillRect(b.x-2, b.y-10, 4, 20);
                ctx.shadowBlur = 0;
            });

            enemies.forEach(e => drawEnemy(ctx, e.x, e.y, frame));
            if(boss) drawBoss(ctx, boss, frame);
            if(player.hp > 0) drawPlayer(ctx, player.x, player.y, frame);

            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
