<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVG Pixel Editor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            user-select: none;
            touch-action: none;
            font-family: 'Inter', sans-serif;
        }
        .grid-container {
            display: grid;
            gap: 1px;
            background: #334155;
            border: 4px solid #334155;
            border-radius: 8px;
            width: fit-content;
            margin: 0 auto;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
        }
        .cell {
            width: clamp(15px, 5vw, 25px);
            height: clamp(15px, 5vw, 25px);
            background: #1e293b;
            cursor: crosshair;
            transition: background 0.1s;
        }
        .cell:hover {
            filter: brightness(1.5);
        }
        pre {
            background: #020617;
            color: #22d3ee;
            padding: 15px;
            border-radius: 12px;
            font-size: 11px;
            max-height: 200px;
            overflow: auto;
            white-space: pre-wrap;
            border: 1px solid #1e293b;
            font-family: 'Fira Code', monospace;
        }
        .copy-success {
            animation: bounce 0.5s ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500">
                PIXEL TO SVG
            </h1>
            <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest">描いて、コピーして、Geminiへ</p>
        </header>

        <!-- Tools Area -->
        <div class="bg-slate-800 p-4 rounded-2xl mb-6 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <input type="color" id="color-picker" class="w-12 h-12 rounded-lg cursor-pointer bg-transparent border-none" value="#22d3ee">
                </div>
                <div class="text-xs font-bold text-slate-400">
                    LEFT: PAINT<br>RIGHT: ERASE
                </div>
            </div>
            
            <div class="flex gap-2">
                <button id="clear-btn" class="px-4 py-2 bg-slate-700 hover:bg-red-500/20 hover:text-red-400 rounded-xl text-sm transition font-bold">
                    CLEAR
                </button>
                <button id="copy-btn" class="px-5 py-2 bg-cyan-500 hover:bg-cyan-400 text-slate-950 rounded-xl text-sm font-black transition shadow-lg shadow-cyan-500/20">
                    COPY CODE
                </button>
            </div>
        </div>

        <!-- The Canvas Grid -->
        <div id="pixel-grid" class="grid-container">
            <!-- Cells generated by JS -->
        </div>

        <!-- Code Output Area -->
        <div class="mt-8">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-bold text-slate-500 tracking-tighter">GENERATED SVG SOURCE</span>
                <span id="copy-toast" class="text-[10px] font-bold text-cyan-400 opacity-0 transition-opacity uppercase">Copied to Clipboard!</span>
            </div>
            <pre id="code-output">Start drawing to generate code...</pre>
        </div>
        <div class="mt-4 text-center">
            <a href="arcade.html" class="text-cyan-400 text-xs hover:underline uppercase tracking-widest">Back to Arcade</a>
        </div>
    </div>

    <!-- Hidden textarea for clipboard fallback -->
    <textarea id="hidden-copy-area" class="fixed -top-full opacity-0 pointer-events-none"></textarea>

    <script>
        const GRID_SIZE = 16;
        const gridContainer = document.getElementById('pixel-grid');
        const codeOutput = document.getElementById('code-output');
        const colorPicker = document.getElementById('color-picker');
        const clearBtn = document.getElementById('clear-btn');
        const copyBtn = document.getElementById('copy-btn');
        const copyToast = document.getElementById('copy-toast');
        const hiddenArea = document.getElementById('hidden-copy-area');

        let isPainting = false;
        let isErasing = false;
        let pixels = {}; 

        function initGrid() {
            gridContainer.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    
                    // Mouse interaction
                    cell.addEventListener('mousedown', (e) => {
                        isPainting = true;
                        isErasing = (e.button === 2);
                        handlePaint(cell);
                    });
                    cell.addEventListener('mouseenter', () => { if (isPainting) handlePaint(cell); });
                    cell.addEventListener('contextmenu', (e) => e.preventDefault());

                    // Touch interaction
                    cell.addEventListener('touchstart', (e) => {
                        isPainting = true;
                        handlePaint(cell);
                        e.preventDefault();
                    }, { passive: false });

                    gridContainer.appendChild(cell);
                }
            }
        }

        // Global touch move handler for drawing
        window.addEventListener('touchmove', (e) => {
            if (!isPainting) return;
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (target && target.classList.contains('cell')) {
                handlePaint(target);
            }
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('mouseup', () => { isPainting = false; isErasing = false; });
        window.addEventListener('touchend', () => { isPainting = false; isErasing = false; });

        function handlePaint(cell) {
            const x = cell.dataset.x;
            const y = cell.dataset.y;
            const key = `${x},${y}`;

            if (isErasing) {
                cell.style.backgroundColor = '';
                delete pixels[key];
            } else {
                const color = colorPicker.value;
                cell.style.backgroundColor = color;
                pixels[key] = color;
            }
            updateSVGCode();
        }

        function updateSVGCode() {
            if (Object.keys(pixels).length === 0) {
                codeOutput.innerText = "Start drawing to generate code...";
                return;
            }

            let svg = `<svg viewBox="0 0 ${GRID_SIZE} ${GRID_SIZE}" xmlns="http://www.w3.org/2000/svg">\n`;
            for (const key in pixels) {
                const [x, y] = key.split(',');
                svg += `  <rect x="${x}" y="${y}" width="1" height="1" fill="${pixels[key]}" />\n`;
            }
            svg += `</svg>`;
            codeOutput.innerText = svg;
        }

        function copyCode() {
            const code = codeOutput.innerText;
            if (code.startsWith("Start")) return;

            // Fallback copy logic for iFrame/Mobile environments
            hiddenArea.value = code;
            hiddenArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast();
                }
            } catch (err) {
                console.error('Copy failed', err);
            }
        }

        function showToast() {
            copyBtn.classList.add('copy-success');
            copyToast.style.opacity = '1';
            
            setTimeout(() => {
                copyBtn.classList.remove('copy-success');
                copyToast.style.opacity = '0';
            }, 2000);
        }

        clearBtn.addEventListener('click', () => {
            document.querySelectorAll('.cell').forEach(c => c.style.backgroundColor = '');
            pixels = {};
            updateSVGCode();
        });

        copyBtn.addEventListener('click', copyCode);

        initGrid();
    </script>
</body>
</html>
