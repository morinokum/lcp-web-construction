<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCP STREAMING STAGE PRO | UNIT-23-PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;900&display=swap');
        
        :root {
            --neon-cyan: #00f2ff;
            --neon-fuchsia: #ff00ff;
            --neon-gold: #ffd700;
            --bg-black: #05010a;
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Share Tech Mono', 'Noto Sans JP', sans-serif;
            overflow: hidden;
            margin: 0;
            height: 100vh;
        }

        /* Scanline Overlay */
        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.2;
        }

        .cyber-panel {
            border: 1px solid rgba(0, 242, 255, 0.3);
            background: rgba(0, 242, 255, 0.02);
            backdrop-filter: blur(5px);
        }

        /* The Main Stage (Composite Area) */
        #stage-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            pointer-events: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        .interactive {
            pointer-events: auto;
        }

        #raw-video {
            display: none;
        }

        .btn-sync {
            background: var(--neon-cyan);
            color: #000;
            font-weight: 900;
            padding: 0.5rem 1.5rem;
            border-radius: 2px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        .btn-sync:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--neon-cyan);
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    
    <!-- VIDEO PROCESSING (Hidden) -->
    <video id="raw-video" autoplay playsinline></video>
    
    <!-- THE COMPOSITE STAGE -->
    <canvas id="stage-canvas"></canvas>

    <!-- UI OVERLAY -->
    <div class="ui-layer">
        
        <!-- TOP: Status and Controls -->
        <div class="flex justify-between items-start">
            <div class="cyber-panel p-4">
                <h1 class="text-2xl font-black italic text-white leading-none">
                    LCP <span class="text-cyan-400">CHROMA_ENGINE</span>
                </h1>
                <p class="text-[8px] text-cyan-700 font-bold uppercase tracking-widest mt-1">UNIT-23-PRO // REALTIME COMPOSITOR</p>
                <div class="mt-4 flex gap-2 interactive">
                    <button id="btn-start" class="btn-sync text-xs">Sync Actor (Kalidoface)</button>
                    <button id="btn-toggle-ui" class="border border-white/20 text-white/50 text-[8px] px-2 hover:bg-white/10">HIDE_UI</button>
                </div>
            </div>

            <div class="text-right">
                <div class="flex items-center gap-2 justify-end">
                    <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
                    <span class="text-xs font-bold text-red-600 tracking-widest">ON_AIR</span>
                </div>
                <div class="text-[10px] text-cyan-400 mt-2 font-mono" id="h-status">H-CODE SYNC: 0.00</div>
            </div>
        </div>

        <!-- BOTTOM: System Log -->
        <div class="grid grid-cols-12 gap-4 items-end">
            <div class="col-span-3 cyber-panel p-3 h-24 overflow-hidden">
                <p class="text-[8px] text-fuchsia-500 font-bold uppercase mb-1">Resonance Field</p>
                <div class="flex items-baseline gap-1">
                    <span class="text-3xl font-black" id="h-val">5.0</span>
                </div>
                <div class="w-full h-1 bg-gray-900 mt-2">
                    <div id="h-bar" class="h-full bg-cyan-400" style="width: 50%;"></div>
                </div>
            </div>

            <div class="col-span-6 text-center">
                <!-- Empty for actor -->
            </div>

            <div class="col-span-3 cyber-panel p-3 h-24 overflow-hidden flex flex-col">
                <p class="text-[8px] text-cyan-400 font-bold uppercase mb-1">Process Log</p>
                <div id="log-flow" class="text-[7px] text-gray-500 leading-none space-y-1 overflow-y-auto">
                    <!-- Logs -->
                </div>
            </div>
        </div>

    </div>

    <script>
        const video = document.getElementById('raw-video');
        const canvas = document.getElementById('stage-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const btnStart = document.getElementById('btn-start');
        const logFlow = document.getElementById('log-flow');
        const hVal = document.getElementById('h-val');
        const hBar = document.getElementById('h-bar');
        const hStatus = document.getElementById('h-status');

        let isStreaming = false;
        let uiVisible = true;

        // Chroma Key Settings (Adjust for target green)
        const targetR = 0;
        const targetG = 255;
        const targetB = 0;
        const threshold = 100; // Sensitivity

        async function startCapture() {
            try {
                // Captures a window (Kalidoface)
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "never" },
                    audio: false
                });
                video.srcObject = stream;
                isStreaming = true;
                addLog("Actor sync initialized.");
                render();
            } catch (err) {
                console.error("Capture failed:", err);
                addLog("Sync failed: User cancelled.");
            }
        }

        function render() {
            if (!isStreaming) return;

            // Set canvas size to screen size
            if (canvas.width !== window.innerWidth) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            // 1. Draw Background
            ctx.fillStyle = '#05010a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid dots
            ctx.fillStyle = 'rgba(0, 242, 255, 0.1)';
            for(let x=0; x<canvas.width; x+=50) {
                for(let y=0; y<canvas.height; y+=50) {
                    ctx.fillRect(x, y, 1, 1);
                }
            }

            // 2. Process Video (Chroma Key)
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // Create temporary canvas to process frames
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = video.videoWidth;
                tempCanvas.height = video.videoHeight;
                const tCtx = tempCanvas.getContext('2d');
                tCtx.drawImage(video, 0, 0);

                const frame = tCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                const l = frame.data.length / 4;

                for (let i = 0; i < l; i++) {
                    const r = frame.data[i * 4 + 0];
                    const g = frame.data[i * 4 + 1];
                    const b = frame.data[i * 4 + 2];

                    // Simple green screen removal
                    // If pixel is green-ish, make it transparent
                    if (g > 100 && g > r * 1.2 && g > b * 1.2) {
                        frame.data[i * 4 + 3] = 0;
                    }
                }
                
                // Draw the transparent character to main stage
                // Scale to fit center
                const scale = (canvas.height * 0.8) / video.videoHeight;
                const w = video.videoWidth * scale;
                const h = video.videoHeight * scale;
                const x = (canvas.width - w) / 2;
                const y = (canvas.height - h); // Place at bottom

                // Create a temporary canvas for the processed image to put back
                const processedCanvas = document.createElement('canvas');
                processedCanvas.width = frame.width;
                processedCanvas.height = frame.height;
                processedCanvas.getContext('2d').putImageData(frame, 0, 0);
                
                ctx.drawImage(processedCanvas, x, y, w, h);
            }

            requestAnimationFrame(render);
        }

        // --- UI Logic ---
        function addLog(msg) {
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            logFlow.prepend(div);
            if(logFlow.childNodes.length > 10) logFlow.lastChild.remove();
        }

        setInterval(() => {
            const h = (Math.random() * 10).toFixed(2);
            hVal.innerText = h;
            hBar.style.width = (h * 10) + "%";
            hStatus.innerText = `H-CODE SYNC: ${h}`;
            if(Math.random() > 0.8) addLog("Resonance wave stable.");
        }, 2000);

        btnStart.onclick = startCapture;
        document.getElementById('btn-toggle-ui').onclick = () => {
            const ui = document.querySelector('.ui-layer');
            uiVisible = !uiVisible;
            ui.style.opacity = uiVisible ? "1" : "0";
        };

        addLog("Engine ready. Waiting for actor...");
    </script>
</body>
</html>
