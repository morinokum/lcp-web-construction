<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOVA CRESTA - GENESIS PROTOCOL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Share Tech Mono', monospace; touch-action: none; }
#container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
canvas { image-rendering: pixelated; display: block; }
/* HUD */
#hud { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10; padding: 12px 18px; display: flex; justify-content: space-between; align-items: flex-start; }
.hud-block { background: rgba(0,0,0,0.7); border: 1px solid rgba(0,255,200,0.3); padding: 6px 12px; font-family: 'Orbitron', monospace; font-size: 11px; color: #0fc; letter-spacing: 2px; clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%); }
.hud-val { font-size: 18px; font-weight: 900; color: #fff; display: block; }
#sync-bar-wrap { width: 100px; height: 6px; background: #111; margin-top: 4px; border: 1px solid #0fc3; }
#sync-bar { height: 100%; background: linear-gradient(90deg, #0fc, #f0f); width: 0%; transition: width 0.3s; }
#units-row { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 10; pointer-events: none; }
.unit-pip { width: 14px; height: 14px; clip-path: polygon(50% 0%, 100% 100%, 0% 100%); background: #333; transition: background 0.3s, filter 0.3s; }
.unit-pip.active { background: #0fc; filter: drop-shadow(0 0 4px #0fc); }
.unit-pip.hyper { background: #f0f; filter: drop-shadow(0 0 6px #f0f); }
/* FORM BUTTON */
#form-btn { position: absolute; bottom: 50px; right: 30px; width: 80px; height: 80px; display: none; justify-content: center; align-items: center; cursor: pointer; z-index: 50; font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 900; color: #fff; letter-spacing: 1px; text-align: center; }
#form-btn svg { position: absolute; top: 0; left: 0; }
#form-btn span { position: relative; z-index: 2; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes spin-r { to { transform: rotate(-360deg); } }
.ring1 { animation: spin 2s linear infinite; transform-origin: 40px 40px; }
.ring2 { animation: spin-r 1.5s linear infinite; transform-origin: 40px 40px; }
/* COMM WINDOW */
#comm-win { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 380px; background: rgba(0,0,0,0.9); border-top: 2px solid #0fc; border-bottom: 2px solid #0fc; padding: 10px 16px; z-index: 40; display: none; clip-path: polygon(12px 0%, calc(100% - 12px) 0%, 100% 12px, 100% calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 0% calc(100% - 12px), 0% 12px); }
#comm-header { font-size: 9px; color: #0fc; letter-spacing: 3px; margin-bottom: 4px; opacity: 0.7; }
#comm-text { color: #fff; font-size: 13px; letter-spacing: 1px; line-height: 1.6; }
/* FLASH & SFX */
#flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 90; }
#sfx-text { position: absolute; width: 100%; text-align: center; z-index: 80; pointer-events: none; display: none; font-family: 'Orbitron', monospace; font-size: 32px; font-weight: 900; color: #fff; letter-spacing: 4px; text-shadow: 0 0 20px #0fc, 0 0 40px #f0f; }
/* TITLE SCREEN */
#msg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 100; cursor: pointer; overflow: hidden; }
#msg-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,255,200,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,200,0.04) 1px, transparent 1px); background-size: 40px 40px; mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%); }
#msg-glow { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(0,255,200,0.07) 0%, transparent 70%); animation: glow-pulse 3s ease-in-out infinite; }
@keyframes glow-pulse { 0%,100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
#title-logo { position: relative; z-index: 2; text-align: center; animation: title-in 1.2s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes title-in { from { opacity: 0; transform: scale(1.4) translateY(-20px); letter-spacing: 30px; } to { opacity: 1; transform: scale(1) translateY(0); } }
#title-main { font-family: 'Orbitron', monospace; font-size: clamp(36px, 8vw, 64px); font-weight: 900; letter-spacing: 8px; color: #fff; text-shadow: 0 0 30px #0fc, 0 0 60px #0fc8, 0 0 120px #0fc4; }
#title-sub { font-size: clamp(10px, 2vw, 14px); letter-spacing: 6px; color: #0fc; margin-top: 8px; opacity: 0.8; }
#title-sep { width: 200px; height: 1px; background: linear-gradient(90deg, transparent, #0fc, transparent); margin: 20px auto; }
#start-prompt { position: relative; z-index: 2; margin-top: 40px; font-family: 'Orbitron', monospace; font-size: 13px; letter-spacing: 4px; color: #0fc; animation: blink 1.2s step-end infinite; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
#title-scan { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #0fc, transparent); opacity: 0.5; animation: scan 4s linear infinite; }
@keyframes scan { from { top: 0; } to { top: 100%; } }
/* EPILOGUE */
#epilogue { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; pointer-events: none; gap: 16px; padding: 40px; }
.epi-line { opacity: 0; transition: opacity 2.5s ease; text-align: center; }
.epi-l1 { font-size: clamp(14px, 3vw, 20px); color: #aaa; letter-spacing: 3px; }
.epi-l2 { font-size: clamp(16px, 4vw, 26px); color: #fff; letter-spacing: 4px; font-family: 'Orbitron', monospace; font-weight: 700; }
.epi-end { font-family: 'Orbitron', monospace; font-size: clamp(36px, 8vw, 64px); font-weight: 900; letter-spacing: 16px; color: #fff; text-shadow: 0 0 40px #0fc, 0 0 80px #0fc; }
/* ALERT */
@keyframes alert-pulse { 0%,100% { box-shadow: inset 0 0 60px rgba(255,0,100,0); } 50% { box-shadow: inset 0 0 60px rgba(255,0,100,0.3); } }
.alert #container::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; animation: alert-pulse 0.4s infinite; pointer-events: none; z-index: 5; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="container">
<canvas id="gameCanvas"></canvas>
<div id="flash"></div>
<div id="sfx-text"></div>
<!-- HUD -->
<div id="hud">
<div class="hud-block">SCORE<br><span class="hud-val" id="score">000000</span></div>
<div class="hud-block" style="text-align:right;">SYNC<br><span class="hud-val" id="sync">0%</span>
<div id="sync-bar-wrap"><div id="sync-bar"></div></div></div>
</div>
<div id="units-row"></div>
<!-- FORM RELEASE BTN -->
<div id="form-btn">
<svg width="80" height="80" viewBox="0 0 80 80">
<circle class="ring1" cx="40" cy="40" r="36" fill="none" stroke="#f0f" stroke-width="2" stroke-dasharray="8 6"/>
<circle class="ring2" cx="40" cy="40" r="28" fill="none" stroke="#0fc" stroke-width="1.5" stroke-dasharray="4 8"/>
<circle cx="40" cy="40" r="20" fill="rgba(0,0,0,0.8)" stroke="#fff" stroke-width="1"/>
</svg>
<span>NOVA<br>FORM</span>
</div>
<!-- COMM WINDOW -->
<div id="comm-win">
<div id="comm-header">// SIGNAL INTERCEPTED //</div>
<div id="comm-text"></div>
</div>
<!-- EPILOGUE -->
<div id="epilogue">
<div class="epi-line epi-l1" id="el1">全ての星の記憶が 融合するとき</div>
<div class="epi-line epi-l2" id="el2">GENESIS PROTOCOL 完全解放</div>
<div class="epi-line epi-l1" id="el3">パイロット、あなたは宇宙の意志となった</div>
<div class="epi-line epi-l1" id="el4">この星に 新たな命の息吹を</div>
<div class="epi-line epi-l2" id="el5" style="color: #0fc;">── テラフォーミング 開始 ──</div>
<div class="epi-line epi-end" id="el6">F I N</div>
</div>
<!-- TITLE -->
<div id="msg">
<div id="msg-grid"></div>
<div id="msg-glow"></div>
<div id="title-scan"></div>
<div id="title-logo"><div id="title-main">NOVA CRESTA</div>
<div id="title-sub">GENESIS PROTOCOL</div>
<div id="title-sep"></div>
</div>
<div id="start-prompt">[ TOUCH TO START ]</div>
</div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const flash = document.getElementById('flash');
const sfxEl = document.getElementById('sfx-text');
const scoreEl = document.getElementById('score');
const syncEl = document.getElementById('sync');
const syncBar = document.getElementById('sync-bar');
const unitsRow = document.getElementById('units-row');
const msgEl = document.getElementById('msg');
const formBtn = document.getElementById('form-btn');
const commWin = document.getElementById('comm-win');
const commText = document.getElementById('comm-text');
const epilogueEl = document.getElementById('epilogue');
let W, H, gameActive = false, score = 0, frame = 0;
let playerUnits = 1, novaMode = false, novaTimer = 0;
let shake = 0, ending = false, boss = null, earthScale = 0;
const player = { x: 0, y: 0, tx: 0, ty: 0, bullets: [], particles: [], trail: [] };
let enemies = [], silos = [], pickups = [], stars = [], nebula = [];
let bossPhase = 0, bossAngle = 0;
const COMM = [ "", "", "", "", "", "≫ UNIT SYNC: 50% ── 機体の拡張を確認。", "≫ WARNING: 時空層に異常が観測された。", "≫ ALERT: 封印が崩れつつある...!", "≫ CRITICAL: 全合体まで あと一歩だ...!", "≫ SIGNAL LOST: ────── ──── ──","≫ NOVA FORM 解放。全宇宙に光を。" ];
function resize() {
H = window.innerHeight;
W = Math.min(window.innerWidth, H * 0.65);
canvas.width = W; canvas.height = H;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
player.x = W / 2; player.y = H * 0.8;
player.tx = player.x; player.ty = player.y;
}
function init() {
resize();
window.addEventListener('resize', resize);
for (let i = 0; i < 120; i++) stars.push({ x: Math.random() * W, y: Math.random() * H, s: Math.random() * 2.5 + 0.5, spd: Math.random() * 1.5 + 0.5, bright: Math.random() });
for (let i = 0; i < 5; i++) nebula.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 120 + 60, hue: Math.random() < 0.5 ? 170 : 290, alpha: Math.random() * 0.06 + 0.02 });
const onMove = (e) => {
if (ending) return;
const cx = e.touches ? e.touches[0].clientX : e.clientX;
const cy = e.touches ? e.touches[0].clientY : e.clientY;
const rect = canvas.getBoundingClientRect();
player.tx = cx - rect.left;
player.ty = cy - rect.top;
};
window.addEventListener('mousemove', onMove);
window.addEventListener('touchmove', (e) => { if (gameActive) e.preventDefault(); onMove(e); }, { passive: false });
msgEl.addEventListener('mousedown', (e) => { e.preventDefault(); if (!gameActive && !ending) startGame(); });
msgEl.addEventListener('touchstart', (e) => { e.preventDefault(); if (!gameActive && !ending) startGame(); });
formBtn.addEventListener('click', activateNova);
formBtn.addEventListener('touchstart', (e) => { e.preventDefault(); activateNova(); });
requestAnimationFrame(loop);
}
function startGame() {
gameActive = true; score = 0; playerUnits = 1; earthScale = 0;
enemies = []; silos = []; pickups = []; boss = null; bossPhase = 0;
player.bullets = []; player.particles = []; player.trail = [];
novaMode = false; novaTimer = 0;
msgEl.classList.add('hidden');
document.body.classList.remove('alert');
}
function showSfx(text, dur = 1600) {
sfxEl.innerText = text; sfxEl.style.display = 'block'; sfxEl.style.top = (H * 0.38) + 'px';
clearTimeout(sfxEl._t); sfxEl._t = setTimeout(() => sfxEl.style.display = 'none', dur);
}
function showComm(idx) {
if (!COMM[idx]) return;
commWin.style.display = 'block'; commText.innerText = COMM[idx];
clearTimeout(commWin._t); commWin._t = setTimeout(() => { commWin.style.display = 'none'; }, 3500);
}
function activateNova() {
if (novaMode || playerUnits < 10) return;
novaMode = true; novaTimer = 900; formBtn.style.display = 'none';
document.body.classList.remove('alert'); shake = 60;
showSfx('NOVA FORM ─ RELEASE'); showComm(10);
}
function fire() {
if (novaMode) {
const n = 16;
for (let i = 0; i < n; i++) {
const a = (i / n) * Math.PI * 2 + frame * 0.08;
player.bullets.push({ x: player.x, y: player.y, vx: Math.cos(a) * 20, vy: -Math.sin(a) * 20, nova: true });
}
player.bullets.push({ x: player.x, y: player.y, vx: 0, vy: -60, beam: true });
} else {
player.bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: -18 });
if (playerUnits >= 4) { player.bullets.push({ x: player.x - 28, y: player.y, vx: -1, vy: -18 }); player.bullets.push({ x: player.x + 28, y: player.y, vx: 1, vy: -18 }); }
if (playerUnits >= 7) { player.bullets.push({ x: player.x - 55, y: player.y + 10, vx: -2.5, vy: -17 }); player.bullets.push({ x: player.x + 55, y: player.y + 10, vx: 2.5, vy: -17 }); }
}
}
function explode(x, y, col, n = 10, power = 12) {
for (let i = 0; i < n; i++) {
const a = Math.random() * Math.PI * 2; const spd = Math.random() * power + 2;
player.particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, life: 30 + Math.random() * 20, maxLife: 50, color: col, size: Math.random() * 4 + 1 });
}
}
function loop() { update(); draw(); requestAnimationFrame(loop); }
function update() {
if (!gameActive && !ending) return;
if (!ending) {
if (novaMode) {
if (novaTimer === 70) { flash.style.opacity = '1'; showSfx('─── GENESIS ───'); shake = 120; }
if (novaTimer < 70) flash.style.opacity = (novaTimer / 70).toFixed(3);
}
player.x += (player.tx - player.x) * 0.12; player.y += (player.ty - player.y) * 0.12;
player.trail.push({ x: player.x, y: player.y, life: novaMode ? 18 : 10 });
if (player.trail.length > 30) player.trail.shift();
for (let i = player.trail.length - 1; i >= 0; i--) { player.trail[i].life--; if (player.trail[i].life <= 0) player.trail.splice(i, 1); }
if (novaMode) { novaTimer--; if (novaTimer <= 0) triggerEnding(); }
if (frame % (novaMode ? 3 : 7) === 0) fire();
for (let i = player.bullets.length - 1; i >= 0; i--) { const b = player.bullets[i]; b.x += b.vx; b.y += b.vy; if (b.y < -500 || b.y > H + 200 || b.x < -300 || b.x > W + 300) player.bullets.splice(i, 1); }
if (playerUnits === 9 && !boss && silos.length === 0) { boss = { x: W / 2, y: -220, hp: 180, maxHp: 180, phase: 0, targetY: 140, angle: 0 }; showSfx('⚠ BOSS INCOMING'); showComm(9); }
updateBoss(); updateEntities();
} else {
player.x += (W / 2 - player.x) * 0.04; player.y += (H / 2 + 80 - player.y) * 0.04;
if (earthScale < 1) earthScale += 0.0025;
}
frame++; scoreEl.innerText = score.toString().padStart(6, '0');
const syncPct = playerUnits * 10; syncEl.innerText = syncPct + '%'; syncBar.style.width = syncPct + '%';
updateUnitPips();
}
function updateBoss() {
if (!boss) return;
if (boss.y < boss.targetY) { boss.y += 2; return; }
boss.angle += 0.025; boss.x = W / 2 + Math.sin(boss.angle) * W * 0.32;
const hpRatio = boss.hp / boss.maxHp;
if (hpRatio < 0.5 && boss.phase === 0) { boss.phase = 1; showSfx('PHASE 2'); shake = 30; }
if (hpRatio < 0.25 && boss.phase === 1) { boss.phase = 2; showSfx('PHASE 3 !!'); shake = 50; }
const spawnRate = boss.phase === 2 ? 30 : boss.phase === 1 ? 40 : 55;
if (frame % spawnRate === 0) {
const n = boss.phase + 3;
for (let j = 0; j < n; j++) {
const a = (j / n) * Math.PI + Math.PI / n;
enemies.push({ x: boss.x, y: boss.y + 70, vx: Math.cos(a) * 3, vy: Math.abs(Math.sin(a)) * 4 + 2, hp: 1, fromBoss: true });
}
}
for (let bi = player.bullets.length - 1; bi >= 0; bi--) {
const b = player.bullets[bi];
if (Math.abs(b.x - boss.x) < 110 && Math.abs(b.y - boss.y) < 85) {
boss.hp -= b.beam ? 5 : b.nova ? 3 : 1; player.bullets.splice(bi, 1);
explode(b.x, b.y, '#fff', 3, 5);
if (boss.hp <= 0) { explode(boss.x, boss.y, '#f80', 60, 18); explode(boss.x, boss.y, '#fff', 40, 22); showSfx('─ BOSS DESTROYED ─'); silos.push({ x: boss.x, y: boss.y, id: 10, hp: 1 }); boss = null; break; }
}
}
}
function updateEntities() {
if (frame % 160 === 0 && playerUnits < 9 && silos.length === 0 && !boss) silos.push({ x: Math.random() * (W - 120) + 60, y: -70, id: playerUnits + 1, hp: 3 + playerUnits });
if (frame % (novaMode ? 20 : 38) === 0 && !ending && !boss) { const spd = 3 + playerUnits * 0.4; enemies.push({ x: Math.random() * W, y: -50, vx: (Math.random() - 0.5) * 3, vy: spd, hp: 1 }); }
for (let i = silos.length - 1; i >= 0; i--) {
const s = silos[i]; s.y += 1.2;
for (let bi = player.bullets.length - 1; bi >= 0; bi--) {
const b = player.bullets[bi];
if (Math.abs(b.x - s.x) < 45 && Math.abs(b.y - s.y) < 45) {
s.hp -= b.nova ? 3 : b.beam ? 4 : 1; player.bullets.splice(bi, 1); explode(b.x, b.y, '#ffd700', 3, 6);
if (s.hp <= 0) { explode(s.x, s.y, '#ffd700', 20, 12); pickups.push({ x: s.x, y: s.y, id: s.id, vy: 2 }); silos.splice(i, 1); score += 2000; break; }
}
}
}
for (let i = pickups.length - 1; i >= 0; i--) {
const p = pickups[i]; p.y += p.vy;
if (Math.abs(player.x - p.x) < 50 && Math.abs(player.y - p.y) < 50) {
playerUnits = p.id; pickups.splice(i, 1); showComm(playerUnits); score += 5000; explode(player.x, player.y, '#0fc', 20, 10);
if (playerUnits === 10) { formBtn.style.display = 'flex'; document.body.classList.add('alert'); showSfx('NOVA FORM ─ STANDBY'); }
}
if (p.y > H + 100) pickups.splice(i, 1);
}
for (let i = enemies.length - 1; i >= 0; i--) {
const e = enemies[i]; e.x += e.vx || 0; e.y += e.vy || 4;
let hit = false;
for (let bi = player.bullets.length - 1; bi >= 0; bi--) {
const b = player.bullets[bi]; const r = b.nova ? 30 : b.beam ? 25 : 28;
if (Math.abs(b.x - e.x) < r && Math.abs(b.y - e.y) < r) { enemies.splice(i, 1); player.bullets.splice(bi, 1); score += 300; explode(e.x, e.y, '#f60', 8, 10); hit = true; break; }
}
if (hit) continue;
if (gameActive && !novaMode && Math.abs(player.x - e.x) < 22 && Math.abs(player.y - e.y) < 22) {
enemies.splice(i, 1);
if (playerUnits > 1) { playerUnits--; shake = 25; explode(player.x, player.y, '#f00', 15, 8); showComm(playerUnits); }
else { gameActive = false; setTimeout(() => { msgEl.classList.remove('hidden'); }, 1000); }
continue;
}
if (e.y > H + 80) enemies.splice(i, 1);
}
for (let i = player.particles.length - 1; i >= 0; i--) {
const p = player.particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
if (p.life <= 0) player.particles.splice(i, 1);
}
}
async function triggerEnding() {
ending = true; gameActive = false; playerUnits = 1; novaMode = false; flash.style.opacity = '0';
document.getElementById('hud').style.display = 'none'; unitsRow.style.display = 'none'; document.body.classList.remove('alert');
epilogueEl.style.display = 'flex'; const wait = ms => new Promise(r => setTimeout(r, ms)); const show = id => { document.getElementById(id).style.opacity = '1'; };
await wait(2200); show('el1'); await wait(4000); show('el2'); await wait(5000); show('el3'); await wait(3500); show('el4'); await wait(4000); show('el5'); await wait(5000); show('el6');
}
function draw() {
ctx.save();
if (shake > 0) { ctx.translate((Math.random() - 0.5) * shake * 0.8, (Math.random() - 0.5) * shake * 0.8); shake *= 0.9; if (shake < 0.5) shake = 0; }
ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
nebula.forEach(n => {
const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
g.addColorStop(0, `hsla(${n.hue},100%,60%,${n.alpha * 2})`); g.addColorStop(1, `hsla(${n.hue},100%,60%,0)`);
ctx.fillStyle = g; ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2); ctx.fill();
});
stars.forEach(s => {
const spd = novaMode ? 30 : s.spd; s.y = (s.y + spd) % H;
const br = novaMode ? 0.5 + Math.sin(frame * 0.1 + s.bright * 10) * 0.5 : s.bright;
ctx.globalAlpha = 0.3 + br * 0.7; ctx.fillStyle = novaMode ? `hsl(${180 + br * 120},100%,80%)` : '#fff'; ctx.fillRect(s.x, s.y, s.s, s.s);
});
ctx.globalAlpha = 1;
if (ending) { drawEarth(); drawFleet(player.x, player.y, 1, false); ctx.restore(); return; }
if (boss) drawBoss();
