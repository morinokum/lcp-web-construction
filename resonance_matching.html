<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIT-18: RESONANCE DESTINY [1-WAY PROTOCOL]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700&family=Share+Tech+Mono&display=swap');
        
        :root {
            --res-pink: #ff007a;
            --res-cyan: #00f2ff;
            --res-gold: #ffd700;
            --bg: #05010a;
        }

        body {
            background-color: var(--bg);
            color: #e0e0e0;
            font-family: 'Shippori Mincho B1', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a0525 0%, #05010a 100%);
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
            height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .header h1 {
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            color: var(--res-cyan);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            margin: 10px 0;
        }

        /* ========== CHAT INTERFACE ========== */
        #chat-panel {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 10px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            margin-top: 10px;
        }

        #message-log {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        .msg-bubble {
            max-width: 80%;
            padding: 12px 15px;
            border-radius: 15px;
            font-size: 0.85rem;
            line-height: 1.6;
            position: relative;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .msg-partner {
            background: rgba(255, 0, 122, 0.1);
            border: 1px solid rgba(255, 0, 122, 0.3);
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            background: #000;
            padding: 15px;
            border-top: 1px solid rgba(0, 242, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .fake-input {
            background: #111;
            border: 1px solid #333;
            color: #666;
            padding: 10px;
            font-size: 0.8rem;
            border-radius: 5px;
            text-align: left;
            cursor: not-allowed;
        }

        .error-msg {
            color: var(--res-pink);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
        }

        /* ========== EXISTING SCAN PANELS ========== */
        .scan-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid var(--res-cyan);
            margin: 40px auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .scan-circle::before {
            content: ""; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid var(--res-pink); animation: pulse 3s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        .sound-choice {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2); padding: 15px; margin-bottom: 10px; cursor: pointer; border-radius: 10px; font-size: 0.9rem;
        }

        .footer { padding: 10px; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; }
        .btn-back { color: var(--res-cyan); text-decoration: none; border: 1px solid var(--res-cyan); padding: 5px 20px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>共鳴の宿命</h1>
        </div>

        <!-- Panel 1: Initial Scan -->
        <div id="setup-panel">
            <p style="font-size: 0.85rem; line-height: 2; margin-top: 20px;">
                あなたの「深層周波数」をスキャン中...<br>
                30世紀のアーカイブから共鳴者を探しています。
            </p>
            <div class="scan-circle" onclick="startScan()">
                <span id="scan-text" style="color: var(--res-cyan); font-size: 0.7rem;">START SCAN</span>
            </div>
            <div id="choices" style="display:none;">
                <div class="sound-choice" onclick="selectSound('deep')">深淵の周波数を選択</div>
                <div class="sound-choice" onclick="selectSound('bright')">光明の周波数を選択</div>
            </div>
        </div>

        <!-- Panel 2: Simulation Chat -->
        <div id="chat-panel">
            <div style="background: rgba(0, 242, 255, 0.05); padding: 10px; font-size: 0.7rem; color: var(--res-cyan); display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0, 242, 255, 0.1);">
                <span>CONNECTED: THERAPIST_REN</span>
                <span id="sync-level">SYNC: 12%</span>
            </div>
            <div id="message-log">
                <!-- Messages will appear here -->
            </div>
            <div class="input-area">
                <div class="fake-input">メッセージを入力...</div>
                <div class="error-msg">⚠️ SYNC_LEVEL_INSUFFICIENT: 返信機能はロックされています</div>
                <button style="background: #222; border: 1px solid #444; color: #666; padding: 5px; font-family: 'Share Tech Mono'; font-size: 0.7rem; cursor: not-allowed;">UNLOCK TRANSMISSION (9,800 Credits)</button>
            </div>
        </div>

        <div class="footer">
            <a href="arcade.html" class="btn-back">EXIT TO ARCADE</a>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const msgLog = document.getElementById('message-log');
        
        const scenarios = {
            deep: [
                "誰か…そこにいるの？",
                "あなたの周波数、とても懐かしい響きがする。失われた21世紀の音だわ。",
                "私はレン。ユグドラシルのアーカイブでセラピストをしています。私の声、届いてる？",
                "返信が来ない…やっぱりまだ、同期が足りないのかしら。でも、あなたが聞いていることはわかるわ。脈動が伝わってくるもの。",
                "お願い。どこにも行かないで。この静寂の中で、あなたのリズムだけが私の救いなの。"
            ],
            bright: [
                "見つけた…！ 素晴らしい輝きの周波数。",
                "あなたが今の時代の「観測者」なのね？ アーカイブが急に熱を帯び始めたわ。",
                "私はレン。この光を絶やさないために、ずっとあなたを探していたの。",
                "何か言って？ …ああ、まだ送信プロトコルが開いていないのね。もどかしいわ。",
                "でもいいの。あなたがそこにいて、この光を感じてくれているだけで。明日もまた、ここで同期しましょう？"
            ]
        };

        function playFM(freq, depth, ratio, rel) {
            const carrier = audioCtx.createOscillator();
            const modulator = audioCtx.createOscillator();
            const modGain = audioCtx.createGain();
            const env = audioCtx.createGain();
            const mainGain = audioCtx.createGain();
            mainGain.connect(audioCtx.destination);
            mainGain.gain.value = 0.3;
            carrier.type = 'sine'; carrier.frequency.value = freq;
            modulator.type = 'sine'; modulator.frequency.value = freq * ratio;
            modGain.gain.value = depth;
            env.gain.setValueAtTime(0.2, audioCtx.currentTime);
            env.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + rel);
            modulator.connect(modGain); modGain.connect(carrier.frequency);
            carrier.connect(env); env.connect(mainGain);
            modulator.start(); carrier.start();
            modulator.stop(audioCtx.currentTime + rel); carrier.stop(audioCtx.currentTime + rel);
        }

        function startScan() {
            audioCtx.resume();
            document.getElementById('scan-text').innerText = "SCANNING...";
            playFM(220, 100, 1.5, 2);
            setTimeout(() => {
                document.getElementById('scan-text').style.display = "none";
                document.getElementById('choices').style.display = "block";
            }, 1000);
        }

        function selectSound(type) {
            playFM(type === 'deep' ? 110 : 440, 400, 1.5, 2);
            document.getElementById('setup-panel').style.display = "none";
            document.getElementById('chat-panel').style.display = "flex";
            
            startConversation(scenarios[type]);
        }

        function startConversation(lines) {
            let index = 0;
            let sync = 12;

            function nextMsg() {
                if (index < lines.length) {
                    const div = document.createElement('div');
                    div.className = 'msg-bubble msg-partner';
                    div.innerText = lines[index];
                    msgLog.appendChild(div);
                    msgLog.scrollTop = msgLog.scrollHeight;
                    
                    // Update sync level slightly
                    sync += Math.floor(Math.random() * 5) + 2;
                    document.getElementById('sync-level').innerText = `SYNC: ${sync}%`;
                    
                    playFM(880, 50, 2.0, 0.1); // Notification sound
                    
                    index++;
                    setTimeout(nextMsg, 4000 + (Math.random() * 3000));
                }
            }
            setTimeout(nextMsg, 1500);
        }
    </script>
</body>
</html>
