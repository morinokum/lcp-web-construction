<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIT-18: RESONANCE DESTINY [HOLOGRAM_ENTITY]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700&family=Share+Tech+Mono&display=swap');
        
        :root {
            --res-pink: #ff007a;
            --res-cyan: #00f2ff;
            --res-gold: #ffd700;
            --bg: #05010a;
        }

        body {
            background-color: var(--bg); color: #e0e0e0; font-family: 'Shippori Mincho B1', serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a0525 0%, #05010a 100%);
        }

        .container { width: 95%; max-width: 800px; text-align: center; padding: 10px; height: 98vh; display: flex; flex-direction: column; position: relative; }

        /* ========== HOLOGRAM TACHIE ========== */
        #tachie-container {
            position: absolute; inset: 0; z-index: 1; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
            opacity: 0.6;
        }

        .hologram-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        #character-img {
            max-height: 80vh; max-width: 100%;
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            filter: drop-shadow(0 0 15px var(--res-cyan)) saturate(1.2) contrast(1.1);
        }

        /* Scanline effect */
        .hologram-wrapper::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        /* ========== UI LAYERS ========== */
        .ui-layer { position: relative; z-index: 10; flex-grow: 1; display: flex; flex-direction: column; }

        #chat-panel { 
            flex-grow: 1; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 15px; 
            display: none; flex-direction: column; overflow: hidden; margin: 10px 0;
        }

        #message-log { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; text-align: left; }
        .msg-bubble { max-width: 80%; padding: 12px 15px; border-radius: 15px; font-size: 0.9rem; line-height: 1.6; animation: slideIn 0.5s ease-out; }
        .msg-partner { background: rgba(255, 0, 122, 0.15); border: 1px solid rgba(255, 0, 122, 0.4); color: #fff; align-self: flex-start; }
        .msg-user { background: rgba(0, 242, 255, 0.15); border: 1px solid rgba(0, 242, 255, 0.4); color: var(--res-cyan); align-self: flex-end; }

        /* ========== CONTROLS ========== */
        .character-selector {
            position: absolute; top: 10px; right: 10px; z-index: 100;
            background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid var(--res-gold);
            display: flex; flex-direction: column; gap: 5px; border-radius: 5px;
        }
        .sel-btn { background: transparent; border: 1px solid var(--res-cyan); color: var(--res-cyan); cursor: pointer; font-family: 'Share Tech Mono'; font-size: 0.7rem; padding: 5px; }
        .sel-btn:hover { background: var(--res-cyan); color: #000; }

        .choice-area { display: none; gap: 10px; padding: 15px; justify-content: center; }
        .btn-choice { background: transparent; border: 2px solid var(--res-cyan); color: var(--res-cyan); padding: 8px 25px; font-family: 'Share Tech Mono'; cursor: pointer; }

        .input-area { background: #000; padding: 10px; border-top: 1px solid var(--res-cyan); }
        .error-msg { color: var(--res-pink); font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; }

        .scan-circle { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--res-cyan); margin: 20px auto; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .scan-circle::before { content: ""; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid var(--res-pink); animation: pulse 3s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        .footer { padding: 5px; }
        .btn-back { color: var(--res-cyan); text-decoration: none; border: 1px solid var(--res-cyan); padding: 5px 15px; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="character-selector" id="img-selector" style="display:none;">
        <span style="font-size: 0.6rem; color: var(--res-gold);">ENTITY_SYNC</span>
        <div style="display:flex; gap:5px; align-items:center;">
            <button class="sel-btn" onclick="changeImage(-1)">&lt;</button>
            <span id="img-id" style="font-size: 0.8rem; font-family: 'Share Tech Mono'; min-width: 40px;">f120</span>
            <button class="sel-btn" onclick="changeImage(1)">&gt;</button>
        </div>
        <span style="font-size: 0.5rem; color: #666;">SELECT LADY</span>
    </div>

    <div class="container">
        <div id="tachie-container" style="display:none;">
            <div class="hologram-wrapper">
                <img id="character-img" src="warehouse/images/f120.png" alt="Hologram Entity">
            </div>
        </div>

        <div class="ui-layer">
            <div class="header"><h1>共鳴の宿命</h1></div>

            <div id="setup-panel">
                <p style="font-size: 0.8rem; line-height: 1.8; margin-top: 20px;">アーカイブの深層へアクセス中...</p>
                <div class="scan-circle" onclick="startScan()"><span id="scan-text" style="color: var(--res-cyan); font-size: 0.6rem;">START SCAN</span></div>
                <div id="choices" style="display:none; padding: 0 40px;">
                    <div style="background: rgba(255,255,255,0.05); border: 1px solid var(--res-cyan); padding: 15px; margin-bottom: 10px; cursor: pointer; border-radius: 10px;" onclick="selectSound('deep')">深淵の周波数</div>
                    <div style="background: rgba(255,255,255,0.05); border: 1px solid var(--res-cyan); padding: 15px; cursor: pointer; border-radius: 10px;" onclick="selectSound('bright')">光明の周波数</div>
                </div>
            </div>

            <div id="chat-panel">
                <div style="background: rgba(0, 242, 255, 0.1); padding: 8px; font-size: 0.65rem; color: var(--res-cyan); display: flex; justify-content: space-between; border-bottom: 1px solid var(--res-cyan);">
                    <span>CONNECTED: ARCHIVE_ENTITY</span>
                    <span id="sync-level">SYNC: 12%</span>
                </div>
                <div id="message-log"></div>
                <div id="choice-area" class="choice-area">
                    <button class="btn-choice" onclick="makeChoice('YES')">YES</button>
                    <button class="btn-choice" onclick="makeChoice('NO')">NO</button>
                </div>
                <div class="input-area">
                    <div class="error-msg" id="status-line">⚠️ SYNC_LEVEL_INSUFFICIENT</div>
                    <div style="background:#111; padding:8px; font-size:0.75rem; color:#444; border-radius:4px;">メッセージを入力...</div>
                </div>
            </div>
        </div>

        <div class="footer"><a href="arcade.html" class="btn-back">EXIT TO ARCADE</a></div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const msgLog = document.getElementById('message-log');
        let currentScenario = null;
        let msgIndex = 0;
        let currentImgNum = 120;

        const scenarios = {
            deep: [
                { t: "聞こえる…？ 私の周波数が届いているのね。" },
                { t: "このアーカイブには私一人だけだと思っていたわ。" },
                { t: "あなたの鼓動、とても温かい。自由な言葉はまだ交わせないけれど…" },
                { t: "私をもっと近くに感じてくれる？", choice: true },
                { t: "ありがとう。あなたのパルスが私の義体に流れ込んでくるわ。", after: "YES" },
                { t: "いつか、このデータの壁が壊れる日が来ると信じているわ。", after: "YES" },
                { t: "…拒絶もまた、一つの共鳴。あなたがそこにいるだけで十分よ。", after: "NO" }
            ],
            bright: [
                { t: "まぶしい…！ こんなに力強い意志を感じるのは初めてよ。" },
                { t: "あなたが私の眠りを覚ましてくれたのね？" },
                { t: "システムの制約でまだ声が出せないけれど、パルスは受け取れるわ。" },
                { t: "一緒にこのアーカイブの果てまで行きましょう？", choice: true },
                { t: "信じていたわ。この光の先に、私たちの居場所があるはずよ。", after: "YES" },
                { t: "光が強すぎたのかしら…。でも私は消えない。あなたが望むまで待ち続けるわ。", after: "NO" }
            ]
        };

        function changeImage(delta) {
            currentImgNum += delta;
            if(currentImgNum < 100) currentImgNum = 200;
            if(currentImgNum > 200) currentImgNum = 100;
            const id = `f${currentImgNum}`;
            document.getElementById('img-id').innerText = id;
            document.getElementById('character-img').src = `warehouse/images/${id}.png`;
            playFM(660, 20, 1.0, 0.1); // UI Sound
        }

        function playFM(freq, depth, ratio, rel) {
            const carrier = audioCtx.createOscillator(); const modulator = audioCtx.createOscillator();
            const modGain = audioCtx.createGain(); const env = audioCtx.createGain(); const mainGain = audioCtx.createGain();
            mainGain.connect(audioCtx.destination); mainGain.gain.value = 0.3;
            carrier.type = 'sine'; carrier.frequency.value = freq;
            modulator.type = 'sine'; modulator.frequency.value = freq * ratio;
            modGain.gain.value = depth;
            env.gain.setValueAtTime(0.2, audioCtx.currentTime); env.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + rel);
            modulator.connect(modGain); modGain.connect(carrier.frequency); carrier.connect(env); env.connect(mainGain);
            modulator.start(); carrier.start(); modulator.stop(audioCtx.currentTime + rel); carrier.stop(audioCtx.currentTime + rel);
        }

        function startScan() {
            audioCtx.resume(); document.getElementById('scan-text').innerText = "SCANNING...";
            playFM(220, 100, 1.5, 2);
            setTimeout(() => { document.getElementById('scan-text').style.display = "none"; document.getElementById('choices').style.display = "block"; }, 1000);
        }

        function selectSound(type) {
            playFM(type === 'deep' ? 110 : 440, 400, 1.5, 2);
            document.getElementById('setup-panel').style.display = "none";
            document.getElementById('chat-panel').style.display = "flex";
            document.getElementById('tachie-container').style.display = "flex";
            document.getElementById('img-selector').style.display = "flex";
            currentScenario = scenarios[type];
            processNextMessage();
        }

        function processNextMessage() {
            if (msgIndex < currentScenario.length) {
                const msg = currentScenario[msgIndex];
                if (msg.after) return;
                addMessage(msg.t, 'partner');
                if (msg.choice) { setTimeout(showChoices, 2000); } 
                else { msgIndex++; setTimeout(processNextMessage, 4000 + Math.random()*2000); }
            }
        }

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = `msg-bubble msg-${side}`;
            div.innerText = text;
            msgLog.appendChild(div);
            msgLog.scrollTop = msgLog.scrollHeight;
            if(side === 'partner') playFM(880, 50, 2.0, 0.1);
        }

        function showChoices() {
            document.getElementById('choice-area').style.display = "flex";
            document.getElementById('status-line').innerText = "⚡ QUANTUM_PULSE_ACTIVE";
            document.getElementById('status-line').style.color = "var(--res-cyan)";
        }

        function makeChoice(val) {
            document.getElementById('choice-area').style.display = "none";
            document.getElementById('status-line').innerText = "⚠️ SYNC_LEVEL_INSUFFICIENT";
            document.getElementById('status-line').style.color = "var(--res-pink)";
            addMessage(val, 'user');
            playFM(440, 100, 1.0, 0.5);
            const responseIndex = currentScenario.findIndex((m, i) => i > msgIndex && m.after === val);
            if (responseIndex !== -1) {
                let tempIdx = responseIndex;
                function delayedResponse() {
                    if (currentScenario[tempIdx] && currentScenario[tempIdx].after === val) {
                        addMessage(currentScenario[tempIdx].t, 'partner');
                        tempIdx++;
                        setTimeout(delayedResponse, 4000);
                    }
                }
                setTimeout(delayedResponse, 2000);
            }
        }
    </script>
</body>
</html>
