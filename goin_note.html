<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOIN NOTE: DEADLINE CHRONICLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            background-color: #0d0208;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; height: 95vh;
            transition: background-color 0.1s;
            overflow: hidden;
        }

        .header {
            border-bottom: 2px solid #00ff41;
            margin-bottom: 10px; padding-bottom: 5px;
            display: flex; justify-content: space-between; align-items: center;
        }

        #timer-bar {
            height: 10px; background: #00ff41; width: 100%;
            margin-bottom: 20px; box-shadow: 0 0 10px #00ff41;
        }

        #note-area {
            flex-grow: 1;
            background: transparent;
            border: 1px solid #003b00;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.5em;
            padding: 20px;
            resize: none;
            outline: none;
            line-height: 1.6;
            transition: transform 0.05s;
        }

        .status-bar {
            margin-top: 10px; font-size: 1.1em;
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn {
            background: transparent; color: #00ff41; border: 1px solid #00ff41;
            padding: 5px 15px; cursor: pointer; font-family: 'Share Tech Mono', monospace;
            text-decoration: none; font-size: 0.9em;
        }
        .btn:hover { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }

        #save-btn { font-weight: bold; font-size: 1.2em; border-width: 2px; }

        /* Animation Classes */
        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        #log-panel {
            position: fixed; top: 50px; right: 20px; width: 250px;
            background: rgba(0, 20, 0, 0.9); border: 1px solid #00ff41;
            padding: 10px; font-size: 0.8em; max-height: 200px; overflow-y: auto;
            display: none;
        }
    </style>
</head>
<body id="body">
    <div class="header">
        <div style="font-size: 1.2em;">[ MISSION: DEADLINE_CHRONICLE ]</div>
        <button class="btn" onclick="toggleLog()">VIEW LOGS</button>
        <a href="arcade.html" class="btn">ABORT</a>
    </div>

    <div id="timer-bar"></div>

    <textarea id="note-area" placeholder="INITIATING... WRITE FAST OR LOSE ALL."></textarea>

    <div id="log-panel" id="log-panel">
        <strong>--- SAVED ARCHIVES ---</strong>
        <div id="log-content"></div>
    </div>

    <div class="status-bar">
        <div>TIME REMAINING: <span id="time-left">60.0</span>s</div>
        <button id="save-btn" class="btn" onclick="saveArchive()">SAVE ARCHIVE [ESC]</button>
        <div>SYNC: <span id="word-count">0</span> chars</div>
    </div>

    <script>
        const noteArea = document.getElementById('note-area');
        const timerBar = document.getElementById('timer-bar');
        const timeLeftEl = document.getElementById('time-left');
        const body = document.getElementById('body');
        const wordCount = document.getElementById('word-count');
        const logContent = document.getElementById('log-content');
        const logPanel = document.getElementById('log-panel');

        let duration = 60.0; // Seconds
        let timeLeft = duration;
        let isActive = false;
        let startTime = 0;

        noteArea.addEventListener('input', () => {
            if(!isActive && noteArea.value.length > 0) {
                startMission();
            }
            wordCount.innerText = noteArea.value.length;
        });

        // Hotkey for Save
        window.addEventListener('keydown', (e) => {
            if(e.key === "Escape") saveArchive();
        });

        function startMission() {
            isActive = true;
            startTime = Date.now();
            update();
        }

        function update() {
            if(!isActive) return;

            const elapsed = (Date.now() - startTime) / 1000;
            timeLeft = Math.max(0, duration - elapsed);
            
            const progress = (timeLeft / duration) * 100;
            timerBar.style.width = progress + "%";
            timeLeftEl.innerText = timeLeft.toFixed(1);

            // Visual Effects based on time
            if (timeLeft < 10) {
                body.style.backgroundColor = `rgb(${Math.floor((10 - timeLeft) * 20)}, 0, 0)`;
                noteArea.classList.add('shake');
                timerBar.style.backgroundColor = "#ff0000";
            } else if (timeLeft < 30) {
                body.style.backgroundColor = `rgb(${Math.floor((30 - timeLeft) * 4)}, 0, 0)`;
                timerBar.style.backgroundColor = "#ffaa00";
            }

            if(timeLeft <= 0) {
                failMission();
            } else {
                requestAnimationFrame(update);
            }
        }

        function saveArchive() {
            if(!isActive || timeLeft <= 0) return;
            
            const content = noteArea.value;
            if(content.trim() === "") return;

            // Save to LocalStorage
            const logs = JSON.parse(localStorage.getItem('goin_logs') || "[]");
            logs.unshift({ date: new Date().toLocaleString(), text: content });
            localStorage.setItem('goin_logs', JSON.stringify(logs.slice(0, 10))); // Keep last 10

            isActive = false;
            alert("SUCCESS: ARCHIVE SECURED.\nTime left: " + timeLeft.toFixed(1) + "s");
            resetMission();
        }

        function failMission() {
            isActive = false;
            noteArea.value = "";
            noteArea.classList.remove('shake');
            body.style.backgroundColor = "#f00";
            alert("CRITICAL FAILURE: DATA PURGED.");
            resetMission();
        }

        function resetMission() {
            timeLeft = duration;
            noteArea.value = "";
            noteArea.placeholder = "MISSION RESET. TYPE TO INITIATE.";
            noteArea.classList.remove('shake');
            body.style.backgroundColor = "#0d0208";
            timerBar.style.width = "100%";
            timerBar.style.backgroundColor = "#00ff41";
            wordCount.innerText = "0";
            loadLogs();
        }

        function toggleLog() {
            logPanel.style.display = logPanel.style.display === 'block' ? 'none' : 'block';
            loadLogs();
        }

        function loadLogs() {
            const logs = JSON.parse(localStorage.getItem('goin_logs') || "[]");
            logContent.innerHTML = logs.map(l => `
                <div style="border-bottom: 1px dotted #00ff41; margin-bottom: 5px; padding-bottom: 5px;">
                    <small>${l.date}</small><br>
                    ${l.text.substring(0, 30)}...
                </div>
            `).join('');
        }

        loadLogs();
    </script>
</body>
</html>
