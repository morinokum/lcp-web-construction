<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOIN NOTE: EXPERT CHRONICLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --term-green: #00ff41;
            --term-red: #ff0000;
            --term-expert: #f0f;
        }

        body {
            background-color: #0d0208;
            color: var(--term-green);
            font-family: 'Share Tech Mono', monospace;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; height: 95vh;
            transition: background-color 0.1s;
            overflow: hidden;
        }

        .header {
            border-bottom: 2px solid var(--term-green);
            margin-bottom: 10px; padding-bottom: 5px;
            display: flex; justify-content: space-between; align-items: center;
        }

        #timer-bar {
            height: 10px; background: var(--term-green); width: 100%;
            margin-bottom: 20px; box-shadow: 0 0 10px var(--term-green);
        }

        #note-area {
            flex-grow: 1;
            background: transparent;
            border: 1px solid #003b00;
            color: var(--term-green);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.5em;
            padding: 20px;
            resize: none;
            outline: none;
            line-height: 1.6;
            transition: transform 0.05s;
        }

        .status-bar {
            margin-top: 10px; font-size: 1.1em;
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn {
            background: transparent; color: var(--term-green); border: 1px solid var(--term-green);
            padding: 5px 15px; cursor: pointer; font-family: 'Share Tech Mono', monospace;
            text-decoration: none; font-size: 0.9em;
        }
        .btn:hover { background: var(--term-green); color: #000; box-shadow: 0 0 15px var(--term-green); }

        .btn-expert { color: var(--term-expert); border-color: var(--term-expert); }
        .btn-expert:hover { background: var(--term-expert); color: #000; box-shadow: 0 0 15px var(--term-expert); }
        .btn-active { background: rgba(0, 255, 65, 0.2); font-weight: bold; }
        .btn-active-expert { background: rgba(255, 0, 255, 0.2); font-weight: bold; }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        #log-panel {
            position: fixed; top: 60px; right: 20px; width: 250px;
            background: rgba(0, 10, 0, 0.95); border: 1px solid var(--term-green);
            padding: 10px; font-size: 0.8em; max-height: 300px; overflow-y: auto;
            display: none; z-index: 200;
        }

        .mode-expert { color: var(--term-expert) !important; border-color: var(--term-expert) !important; }
        .mode-expert #timer-bar { background-color: var(--term-expert) !important; box-shadow: 0 0 10px var(--term-expert); }
        .mode-expert #note-area { border-color: var(--term-expert); color: var(--term-expert); }
    </style>
</head>
<body id="body">
    <div class="header" id="header-ui">
        <div>[ MISSION: <span id="mode-title">NORMAL_CHRONICLE</span> ]</div>
        <div>
            <button id="btn-normal" class="btn btn-active" onclick="setMode(60, 'NORMAL')">NORMAL (60s)</button>
            <button id="btn-expert" class="btn btn-expert" onclick="setMode(10, 'EXPERT')">EXPERT (10s)</button>
        </div>
        <button class="btn" onclick="toggleLog()">LOGS</button>
        <a href="arcade.html" class="btn">ABORT</a>
    </div>

    <div id="timer-bar"></div>

    <textarea id="note-area" placeholder="TYPE TO INITIATE..."></textarea>

    <div id="log-panel">
        <strong>--- SAVED ARCHIVES ---</strong>
        <div id="log-content"></div>
    </div>

    <div class="status-bar">
        <div>TIME: <span id="time-left">60.0</span>s</div>
        <button id="save-btn" class="btn" style="font-weight:bold; border-width:2px;" onclick="saveArchive()">SAVE [ESC]</button>
        <div>SYNC: <span id="word-count">0</span> chars</div>
    </div>

    <script>
        const noteArea = document.getElementById('note-area');
        const timerBar = document.getElementById('timer-bar');
        const timeLeftEl = document.getElementById('time-left');
        const body = document.getElementById('body');
        const wordCount = document.getElementById('word-count');
        const logContent = document.getElementById('log-content');
        const logPanel = document.getElementById('log-panel');
        const modeTitle = document.getElementById('mode-title');
        const btnNormal = document.getElementById('btn-normal');
        const btnExpert = document.getElementById('btn-expert');

        let duration = 60.0;
        let timeLeft = duration;
        let isActive = false;
        let startTime = 0;
        let currentMode = 'NORMAL';

        function setMode(sec, name) {
            if(isActive) return;
            duration = sec;
            timeLeft = sec;
            currentMode = name;
            timeLeftEl.innerText = sec.toFixed(1);
            modeTitle.innerText = name + '_CHRONICLE';
            
            if(name === 'EXPERT') {
                body.classList.add('mode-expert');
                btnExpert.classList.add('btn-active-expert');
                btnNormal.classList.remove('btn-active');
            } else {
                body.classList.remove('mode-expert');
                btnNormal.classList.add('btn-active');
                btnExpert.classList.remove('btn-active-expert');
            }
        }

        noteArea.addEventListener('input', () => {
            if(!isActive && noteArea.value.length > 0) {
                startMission();
            }
            wordCount.innerText = noteArea.value.length;
        });

        window.addEventListener('keydown', (e) => {
            if(e.key === "Escape") saveArchive();
        });

        function startMission() {
            isActive = true;
            startTime = Date.now();
            update();
        }

        function update() {
            if(!isActive) return;
            const elapsed = (Date.now() - startTime) / 1000;
            timeLeft = Math.max(0, duration - elapsed);
            
            const progress = (timeLeft / duration) * 100;
            timerBar.style.width = progress + "%";
            timeLeftEl.innerText = timeLeft.toFixed(1);

            const warningThreshold = duration * 0.5;
            const criticalThreshold = duration * 0.15;

            if (timeLeft < criticalThreshold) {
                body.style.backgroundColor = currentMode === 'EXPERT' ? "#404" : "#400";
                noteArea.classList.add('shake');
                timerBar.style.backgroundColor = "#f00";
            } else if (timeLeft < warningThreshold) {
                body.style.backgroundColor = "#200";
            }

            if(timeLeft <= 0) {
                failMission();
            } else {
                requestAnimationFrame(update);
            }
        }

        function saveArchive() {
            if(!isActive || timeLeft <= 0) return;
            const content = noteArea.value;
            if(content.trim() === "") return;

            const logs = JSON.parse(localStorage.getItem('goin_logs') || "[]");
            logs.unshift({ date: new Date().toLocaleString(), text: `[${currentMode}] ` + content });
            localStorage.setItem('goin_logs', JSON.stringify(logs.slice(0, 10)));

            isActive = false;
            alert("SUCCESS: ARCHIVE SECURED.\nMode: " + currentMode + "\nTime: " + timeLeft.toFixed(1) + "s");
            resetMission();
        }

        function failMission() {
            isActive = false;
            noteArea.value = "";
            body.style.backgroundColor = "#f00";
            alert("CRITICAL FAILURE: ARCHIVE PURGED.");
            resetMission();
        }

        function resetMission() {
            timeLeft = duration;
            noteArea.value = "";
            noteArea.placeholder = "TYPE TO INITIATE MISSION...";
            noteArea.classList.remove('shake');
            body.style.backgroundColor = "#0d0208";
            timerBar.style.width = "100%";
            timerBar.style.backgroundColor = currentMode === 'EXPERT' ? "var(--term-expert)" : "var(--term-green)";
            wordCount.innerText = "0";
            loadLogs();
        }

        function toggleLog() {
            logPanel.style.display = logPanel.style.display === 'block' ? 'none' : 'block';
            loadLogs();
        }

        function loadLogs() {
            const logs = JSON.parse(localStorage.getItem('goin_logs') || "[]");
            logContent.innerHTML = logs.map(l => `
                <div style="border-bottom: 1px dotted #00ff41; margin-bottom: 5px; padding-bottom: 5px; color: ${l.text.startsWith('[EXPERT]') ? '#f0f' : '#0fc'}">
                    <small>${l.date}</small><br>
                    ${l.text.substring(0, 40)}...
                </div>
            `).join('');
        }

        loadLogs();
    </script>
</body>
</html>
