<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIT-10: WITCH BATTLE VS OKINO [HIROSHI_ALGORITHM]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Share Tech Mono', monospace; overflow: hidden; touch-action: none; }
        canvas { display: block; image-rendering: pixelated; cursor: crosshair; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; width: calc(100% - 20px); z-index: 10; }
        .hp-bar-wrap { width: 100%; height: 10px; background: #200; border: 1px solid #f00; margin-top: 5px; }
        #boss-hp { height: 100%; background: linear-gradient(90deg, #f00, #f0f); width: 100%; transition: width 0.1s; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: 2em; text-shadow: 0 0 10px #f0f; z-index: 20; }
        .btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #0fc; border: 1px solid #0fc; padding: 10px 20px; cursor: pointer; text-decoration: none; z-index: 30; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="display:flex; justify-content:space-between;">
            <span>TARGET: WITCH_OKINO</span>
            <span>SYNC_LEVEL: <span id="score">0</span></span>
        </div>
        <div class="hp-bar-wrap"><div id="boss-hp"></div></div>
    </div>
    <div id="msg">ACCESSING ARCHIVE...<br>[ TOUCH TO START BATTLE ]</div>
    <canvas id="gameCanvas"></canvas>
    <a href="arcade.html" class="btn" style="bottom: 20px;">BACK TO ARCADE</a>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const bossHpEl = document.getElementById('boss-hp');
        const scoreEl = document.getElementById('score');
        const msgEl = document.getElementById('msg');

        let W, H, gameActive = false, score = 0, frame = 0;

        // --- FM BGM ENGINE (HIROSHI THEORY ALGORITHM) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const mainGain = audioCtx.createGain();
        mainGain.connect(audioCtx.destination);
        mainGain.gain.value = 0.3;

        const emotions = {
            "joy": { "tempo": 192, "rhythm": [0.5, 2, 0.5, 1, 1, 1, 1, 1, 1, 0.5] },
            "anger": { "tempo": 180, "rhythm": [0.25, 0.25, 0.25, 0.25] },
            "sorrow": { "tempo": 76, "rhythm": [3] },
            "pleasure": { "tempo": 69, "rhythm": [1.5, 0.5, 1.5, 0.5] }
        };

        const frequencies = {
            'C3': 130.81, 'D3': 146.83, 'E3': 164.81, 'F3': 174.61, 'G3': 196.00, 'A3': 220.00, 'B3': 246.94,
            'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23, 'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
            'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46, 'G5': 783.99, 'A5': 880.00, 'B5': 987.77, 'C6': 1046.50
        };

        const bgmTracks = [
            { "emotion": "joy", "sequence": ["A4", "F3", "E5", "E5", "F3", "E4", "B4", "A4", "D3", "C3"], "step": 0, "fm": { "depth": 1861, "ratio": 3.5, "rel": 0.3 } },
            { "emotion": "joy", "sequence": ["G4", "B3", "F5", "E5", "D5", "F3", "D3", "F4"], "step": 0, "fm": { "depth": 1620, "ratio": 4.4, "rel": 0.95 } },
            { "emotion": "sorrow", "sequence": ["B5", "A5", "G5", "G3", "F3", "D3"], "step": 0, "fm": { "depth": 1578, "ratio": 6.3, "rel": 1.6 } }
        ];

        function playFM(note, fmParams) {
            if(!frequencies[note]) return;
            const freq = frequencies[note];
            const carrier = audioCtx.createOscillator();
            const modulator = audioCtx.createOscillator();
            const modGain = audioCtx.createGain();
            const env = audioCtx.createGain();

            carrier.type = 'sine';
            carrier.frequency.value = freq;
            modulator.type = 'sine';
            modulator.frequency.value = freq * fmParams.ratio;
            modGain.gain.value = fmParams.depth;

            env.gain.setValueAtTime(0.2, audioCtx.currentTime);
            env.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + fmParams.rel);

            modulator.connect(modGain);
            modGain.connect(carrier.frequency);
            carrier.connect(env);
            env.connect(mainGain);

            modulator.start();
            carrier.start();
            modulator.stop(audioCtx.currentTime + fmParams.rel);
            carrier.stop(audioCtx.currentTime + fmParams.rel);
        }

        function playBgmTrack(idx) {
            if(!gameActive) return;
            const t = bgmTracks[idx];
            const emo = emotions[t.emotion];
            const note = t.sequence[t.step % t.sequence.length];
            const interval = (60 / emo.tempo) * emo.rhythm[t.step % emo.rhythm.length] * 1000;

            if(note) playFM(note, t.fm);
            
            t.step++;
            setTimeout(() => playBgmTrack(idx), interval);
        }

        // --- OKINO PIXEL DATA ---
        const okinoPixels = [
            {x:6,y:9,c:"#df58b4"},{x:6,y:8,c:"#0929ce"},{x:7,y:7,c:"#0929ce"},{x:9,y:6,c:"#ab5eb5"},{x:9,y:5,c:"#ffffff"},
            {x:10,y:5,c:"#ffffff"},{x:10,y:4,c:"#131111"},{x:11,y:4,c:"#ce091c"},{x:11,y:3,c:"#ce091c"},{x:10,y:3,c:"#131111"},
            {x:9,y:4,c:"#ffffff"},{x:8,y:6,c:"#ab5eb5"},{x:7,y:6,c:"#ab5eb5"},{x:12,y:3,c:"#ce091c"},{x:13,y:2,c:"#ce091c"},
            {x:5,y:5,c:"#ce091c"},{x:6,y:6,c:"#151414"},{x:5,y:7,c:"#ab5eb5"},{x:4,y:8,c:"#0929ce"},{x:4,y:9,c:"#ab5eb5"},
            {x:3,y:9,c:"#0929ce"},{x:7,y:9,c:"#df58b4"},{x:8,y:9,c:"#0929ce"},{x:9,y:9,c:"#0929ce"},{x:12,y:1,c:"#ce091c"},
            {x:13,y:4,c:"#ce091c"},{x:14,y:7,c:"#0929ce"},{x:13,y:8,c:"#ab5eb5"},{x:13,y:9,c:"#0929ce"},{x:12,y:9,c:"#df58b4"},
            {x:11,y:10,c:"#df58b4"},{x:10,y:10,c:"#df58b4"},{x:9,y:10,c:"#df58b4"},{x:8,y:10,c:"#df58b4"},{x:7,y:10,c:"#df58b4"},
            {x:5,y:9,c:"#0929ce"},{x:6,y:7,c:"#0929ce"},{x:12,y:6,c:"#ce091c"},{x:12,y:7,c:"#ab5eb5"},{x:12,y:8,c:"#0929ce"},
            {x:12,y:10,c:"#0929ce"},{x:6,y:1,c:"#ce091c"},{x:5,y:4,c:"#ce091c"},{x:5,y:6,c:"#ce091c"},{x:9,y:7,c:"#0929ce"},
            {x:10,y:7,c:"#0929ce"},{x:11,y:7,c:"#0929ce"},{x:14,y:2,c:"#ce091c"},{x:6,y:2,c:"#ce091c"},{x:8,y:7,c:"#0929ce"},
            {x:10,y:6,c:"#ab5eb5"},{x:11,y:2,c:"#ce091c"},{x:10,y:1,c:"#ce091c"},{x:7,y:8,c:"#0929ce"},{x:8,y:8,c:"#0929ce"},
            {x:9,y:3,c:"#ffffff"},{x:9,y:2,c:"#ce091c"},{x:8,y:2,c:"#ce091c"},{x:7,y:2,c:"#ce091c"},{x:7,y:3,c:"#131111"},
            {x:6,y:3,c:"#ce091c"},{x:6,y:4,c:"#ce091c"},{x:6,y:5,c:"#ce091c"},{x:1,y:12,c:"#ce09ad"},{x:2,y:8,c:"#ab5eb5"},
            {x:2,y:6,c:"#0929ce"},{x:8,y:3,c:"#ffffff"},{x:8,y:4,c:"#ffffff"},{x:7,y:4,c:"#131111"},{x:7,y:5,c:"#ffffff"},
            {x:8,y:5,c:"#ffffff"},{x:7,y:1,c:"#ce091c"},{x:8,y:1,c:"#ce091c"},{x:9,y:1,c:"#ce091c"},{x:9,y:0,c:"#ce091c"},
            {x:11,y:0,c:"#ce091c"},{x:11,y:1,c:"#ce091c"},{x:10,y:2,c:"#ce091c"},{x:11,y:5,c:"#ce091c"},{x:11,y:6,c:"#ce091c"},
            {x:4,y:7,c:"#0929ce"},{x:3,y:7,c:"#0929ce"},{x:3,y:6,c:"#0929ce"},{x:3,y:8,c:"#0929ce"},{x:2,y:9,c:"#0929ce"},
            {x:2,y:10,c:"#0929ce"},{x:13,y:7,c:"#0929ce"},{x:11,y:9,c:"#df58b4"},{x:4,y:10,c:"#0929ce"},{x:4,y:11,c:"#0929ce"},
            {x:14,y:8,c:"#0929ce"},{x:14,y:9,c:"#0929ce"},{x:14,y:10,c:"#0929ce"},{x:13,y:10,c:"#0929ce"},{x:13,y:11,c:"#ce09ad"},
            {x:7,y:11,c:"#0929ce"},{x:8,y:11,c:"#0929ce"},{x:9,y:11,c:"#0929ce"},{x:10,y:11,c:"#0929ce"},{x:10,y:12,c:"#0929ce"},
            {x:9,y:12,c:"#0929ce"},{x:8,y:12,c:"#0929ce"},{x:7,y:12,c:"#0929ce"},{x:6,y:12,c:"#0929ce"},{x:6,y:13,c:"#0929ce"},
            {x:7,y:13,c:"#0929ce"},{x:8,y:13,c:"#0929ce"},{x:8,y:14,c:"#ce09ad"},{x:9,y:13,c:"#0929ce"},{x:6,y:14,c:"#ce09ad"},
            {x:10,y:13,c:"#0929ce"},{x:10,y:14,c:"#ce09ad"},{x:4,y:14,c:"#ce09ad"},{x:3,y:10,c:"#0929ce"},{x:5,y:13,c:"#0929ce"},
            {x:3,y:14,c:"#ce09ad"},{x:5,y:14,c:"#ce09ad"},{x:7,y:14,c:"#ce09ad"},{x:9,y:14,c:"#ce09ad"},{x:11,y:14,c:"#ce09ad"},
            {x:3,y:11,c:"#ce09ad"},{x:3,y:12,c:"#ce09ad"},{x:2,y:12,c:"#ce09ad"},{x:2,y:11,c:"#ce09ad"},{x:14,y:11,c:"#ce09ad"},
            {x:13,y:12,c:"#ce09ad"},{x:12,y:11,c:"#ce09ad"},{x:14,y:12,c:"#ce09ad"},{x:14,y:13,c:"#ce09ad"},{x:14,y:14,c:"#ce09ad"},
            {x:9,y:8,c:"#0929ce"},{x:10,y:8,c:"#0929ce"},{x:11,y:8,c:"#0929ce"},{x:10,y:9,c:"#0929ce"},{x:5,y:8,c:"#0929ce"}
        ];

        const player = { x: 0, y: 0, bullets: [] };
        const boss = { x: 0, y: 50, hp: 1000, maxHp: 1000, tx: 0, ty: 50 };
        const bossBullets = [];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            player.x = W / 2;
            player.y = H - 100;
            boss.x = W / 2 - 80;
            boss.tx = boss.x;
        }

        function init() {
            resize();
            window.addEventListener('resize', resize);
            
            const onMove = (e) => {
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                player.x = cx;
                player.y = cy;
            };
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', (e) => { onMove(e); e.preventDefault(); }, {passive:false});
            
            const onStart = () => {
                if(!gameActive) {
                    audioCtx.resume();
                    startGame();
                } else {
                    fire();
                }
            };
            window.addEventListener('mousedown', onStart);
            window.addEventListener('touchstart', (e) => { onStart(); e.preventDefault(); }, {passive:false});

            draw();
        }

        function startGame() {
            gameActive = true;
            score = 0;
            boss.hp = boss.maxHp;
            bossBullets.length = 0;
            player.bullets.length = 0;
            msgEl.style.display = "none";
            
            // Start FM BGM Tracks
            bgmTracks.forEach((_, i) => playBgmTrack(i));
        }

        function fire() {
            player.bullets.push({x: player.x, y: player.y - 20, v: 15});
        }

        function spawnBossBullet(type) {
            if(type === 'magenta') {
                for(let i=0; i<12; i++) {
                    const a = (i/12) * Math.PI * 2 + frame*0.08;
                    bossBullets.push({x: boss.x + 80, y: boss.y + 80, vx: Math.cos(a)*5, vy: Math.sin(a)*5, c: "#f0f", r: 6});
                }
            } else if(type === 'blue') {
                bossBullets.push({x: Math.random()*W, y: -20, vx: 0, vy: 8, c: "#0929ce", r: 20});
            }
        }

        function drawOkino(x, y, scale, flicker) {
            ctx.save();
            ctx.translate(x, y);
            if(flicker) ctx.globalAlpha = 0.5 + Math.random()*0.5;
            okinoPixels.forEach(p => {
                ctx.fillStyle = p.c;
                ctx.fillRect(p.x * scale, p.y * scale, scale, scale);
            });
            ctx.restore();
        }

        function update() {
            if(!gameActive) return;
            frame++;

            boss.x += (boss.tx - boss.x) * 0.03;
            if(frame % 80 === 0) {
                boss.tx = Math.random() * (W - 160);
            }

            if(frame % 50 === 0) spawnBossBullet('magenta');
            if(frame % 120 === 0) spawnBossBullet('blue');

            for(let i = player.bullets.length - 1; i >= 0; i--) {
                const b = player.bullets[i];
                b.y -= b.v;
                if(b.y < -20) { player.bullets.splice(i, 1); continue; }
                if(b.x > boss.x && b.x < boss.x + 160 && b.y > boss.y && b.y < boss.y + 160) {
                    boss.hp -= 10;
                    score += 100;
                    player.bullets.splice(i, 1);
                    if(boss.hp <= 0) win();
                }
            }

            for(let i = bossBullets.length - 1; i >= 0; i--) {
                const b = bossBullets[i];
                b.x += b.vx || 0;
                b.y += b.vy || 0;
                if(b.y > H + 50 || b.x < -50 || b.x > W + 50) { bossBullets.splice(i, 1); continue; }
                const dx = b.x - player.x;
                const dy = b.y - player.y;
                if(Math.sqrt(dx*dx + dy*dy) < b.r + 10) {
                    lose();
                }
            }

            scoreEl.innerText = score;
            bossHpEl.style.width = (boss.hp / boss.maxHp * 100) + "%";
        }

        function win() {
            gameActive = false;
            msgEl.style.display = "block";
            msgEl.innerHTML = "WITCH DISPELLED<br>ARCHIVE STABILIZED<br>[ CLICK TO REPLAY ]";
            msgEl.style.color = "#0fc";
        }

        function lose() {
            gameActive = false;
            msgEl.style.display = "block";
            msgEl.innerHTML = "CURSED BY OKINO<br>DATA CORRUPTED<br>[ CLICK TO REPLAY ]";
            msgEl.style.color = "#f00";
        }

        function draw() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = "#333";
            for(let i=0; i<30; i++) ctx.fillRect((i*W/30), (frame*2 + i*H/30)%H, 2, 2);

            if(gameActive || boss.hp <= 0 || score > 0) {
                drawOkino(boss.x, boss.y + Math.sin(frame*0.05)*15, 10, boss.hp < 200);
            }

            ctx.fillStyle = "#0fc";
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - 20);
            ctx.lineTo(player.x - 15, player.y + 10);
            ctx.lineTo(player.x + 15, player.y + 10);
            ctx.fill();

            ctx.fillStyle = "#fff";
            player.bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 15));

            bossBullets.forEach(b => {
                ctx.fillStyle = b.c;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
            });

            update();
            requestAnimationFrame(draw);
        }

        init();
    </script>
</body>
</html>
