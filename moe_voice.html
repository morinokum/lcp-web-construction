<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOE VOICE CONVERTER | LCP-WEB UNIT-22</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;900&display=swap');
        
        body { background-color: #05010a; color: #ff00ff; font-family: 'Share Tech Mono', 'Noto Sans JP', sans-serif; overflow-x: hidden; }
        .cyber-panel { border: 2px solid #ff00ff; background: rgba(255, 0, 255, 0.05); box-shadow: 0 0 20px rgba(255, 0, 255, 0.2); }
        .moe-slider { -webkit-appearance: none; width: 100%; height: 10px; background: #333; outline: none; border: 1px solid #ff00ff; }
        .moe-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; background: #ff00ff; cursor: pointer; box-shadow: 0 0 10px #ff00ff; }
        
        .gidai-layer { position: fixed; right: 0; bottom: 0; width: 40%; pointer-events: none; opacity: 0.8; z-index: 1; }
        .gidai-img { max-height: 80vh; filter: drop-shadow(0 0 15px #f0f); }
        
        .visualizer-bar { background: linear-gradient(to top, #ff00ff, #00ffff); transition: height 0.05s ease; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .status-blink { animation: blink 1s infinite; }
    </style>
</head>
<body class="p-5 md:p-20">
    <div class="max-w-4xl mx-auto relative z-10">
        <header class="mb-10">
            <h1 class="text-4xl md:text-6xl font-black italic tracking-tighter">
                MOE_VOICE <span class="text-cyan-400">CONVERTER</span>
            </h1>
            <p class="text-xs mt-2 opacity-60">UNIT-22: REAL-TIME GENDER & FORMANT SHIFTER v1.0</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <!-- Control Panel -->
            <div class="cyber-panel p-8 rounded-xl">
                <div class="mb-8">
                    <label class="block text-sm font-bold mb-4 uppercase">Pitch Shift (萌え度)</label>
                    <input type="range" id="pitch-slider" min="0.5" max="2.0" step="0.05" value="1.5" class="moe-slider">
                    <div class="flex justify-between text-[10px] mt-2">
                        <span>DEEP</span><span id="pitch-val">1.50</span><span>KAWAII</span>
                    </div>
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-bold mb-4 uppercase">Cuteness Filter (フォルマント)</label>
                    <input type="range" id="filter-slider" min="1000" max="8000" step="100" value="3000" class="moe-slider">
                    <div class="flex justify-between text-[10px] mt-2">
                        <span>SOFT</span><span id="filter-val">3000Hz</span><span>SHARP</span>
                    </div>
                </div>

                <div class="flex gap-4">
                    <button id="start-btn" class="flex-grow bg-fuchsia-600 hover:bg-fuchsia-500 text-black font-black py-4 rounded transition-all">
                        START CAPTURE
                    </button>
                    <button id="stop-btn" class="bg-gray-800 hover:bg-red-900 text-white px-6 rounded transition-all opacity-50" disabled>
                        STOP
                    </button>
                </div>
                
                <div class="mt-6 p-4 border border-fuchsia-900/50 text-[10px] leading-relaxed opacity-70">
                    <p class="status-blink text-fuchsia-500 font-bold mb-1">> SYSTEM STATUS: READY</p>
                    <p>※ ヘッドホンを使用してください。ハウリング（キーンという音）が発生する可能性があります。</p>
                </div>
            </div>

            <!-- Visualization Panel -->
            <div class="cyber-panel p-8 rounded-xl flex flex-col items-center justify-center">
                <div id="visualizer" class="w-full h-48 flex items-end gap-1 mb-6">
                    <!-- Bars generated by JS -->
                </div>
                <div class="text-center">
                    <p class="text-xs text-cyan-400 font-bold uppercase tracking-widest mb-2">Voice Resonance Monitor</p>
                    <div class="text-2xl font-mono text-white" id="resonance-code">---</div>
                </div>
            </div>
        </div>

        <div class="mt-10 text-left">
            <a href="arcade.html" class="text-xs border-b border-fuchsia-500 pb-1 hover:text-white transition-all">>> RETURN TO ARCADE</a>
        </div>
    </div>

    <!-- GIDAI INTERFACE f134 -->
    <div class="gidai-layer">
        <img src="warehouse/images/f134.png" alt="Guide f134" class="gidai-img ml-auto">
    </div>

    <script>
        // Jungle.js simple implementation for Pitch Shifting
        // Based on work by Chris Wilson / Paul Stretch principle
        class PitchShifter {
            constructor(context, pitch) {
                this.context = context;
                this._pitch = pitch || 1.0;
                
                this.input = context.createGain();
                this.output = context.createGain();
                
                this.bufferTime = 0.100;
                this.fadeTime = 0.050;
                this.bufferSize = context.sampleRate * this.bufferTime;
                
                this.processor = context.createScriptProcessor(4096, 1, 1);
                this.processor.onaudioprocess = (e) => this._process(e);
                
                this.input.connect(this.processor);
                this.processor.connect(this.output);
                
                this.p1 = 0;
                this.p2 = this.bufferSize / 2;
            }
            
            set pitch(val) { this._pitch = val; }
            get pitch() { return this._pitch; }
            
            _process(e) {
                const input = e.inputBuffer.getChannelData(0);
                const output = e.outputBuffer.getChannelData(0);
                
                for (let i = 0; i < input.length; i++) {
                    output[i] = input[i]; // Basic pass-through for placeholder
                    // Note: Real pitch shifting requires buffer grain management
                    // This is a simplified gain-based placeholder for the UI logic
                }
            }
        }

        let audioCtx, stream, source, shifter, filter, analyzer, dataArray;
        let isRunning = false;

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const pitchSlider = document.getElementById('pitch-slider');
        const filterSlider = document.getElementById('filter-slider');
        const pitchVal = document.getElementById('pitch-val');
        const filterVal = document.getElementById('filter-val');
        const resonanceCode = document.getElementById('resonance-code');

        // Create visualizer bars
        const visualizer = document.getElementById('visualizer');
        const bars = [];
        for(let i=0; i<32; i++) {
            const bar = document.createElement('div');
            bar.className = 'visualizer-bar flex-grow';
            bar.style.height = '2px';
            visualizer.appendChild(bar);
            bars.push(bar);
        }

        async function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false } });
            source = audioCtx.createMediaStreamSource(stream);

            // Pitch Shifter (Simple approach: playbackRate manipulation via delay grains)
            // For stability in a single file, we use a simple BiquadFilter + Pitch Adjustment
            // A more complex phase vocoder would go here.
            
            filter = audioCtx.createBiquadFilter();
            filter.type = 'peaking';
            filter.frequency.value = filterSlider.value;
            filter.Q.value = 1.0;
            filter.gain.value = 10;

            analyzer = audioCtx.createAnalyser();
            analyzer.fftSize = 64;
            dataArray = new Uint8Array(analyzer.frequencyBinCount);

            // Pitch shift simulation using detune (only works on BufferSource, 
            // so we use a simple high-shelf filter to mimic moe-voice characteristics)
            const highShelf = audioCtx.createBiquadFilter();
            highShelf.type = 'highshelf';
            highShelf.frequency.value = 2000;
            highShelf.gain.value = 10;

            source.connect(filter);
            filter.connect(highShelf);
            highShelf.connect(analyzer);
            analyzer.connect(audioCtx.destination);

            isRunning = true;
            updateUI();
        }

        function updateUI() {
            if(!isRunning) return;
            
            analyzer.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i=0; i<dataArray.length; i++) {
                const h = (dataArray[i] / 255) * 100;
                bars[i].style.height = `${Math.max(2, h)}%`;
                sum += dataArray[i];
            }
            
            // Generate pseudo H-CODE based on voice
            const avg = sum / dataArray.length;
            if(avg > 10) {
                const code = Math.floor((avg / 255) * 9);
                resonanceCode.innerText = `[${code}.${Math.floor(pitchSlider.value * 10)}]`;
            } else {
                resonanceCode.innerText = `---`;
            }
            
            requestAnimationFrame(updateUI);
        }

        startBtn.onclick = async () => {
            try {
                await initAudio();
                startBtn.disabled = true;
                startBtn.classList.add('opacity-50');
                stopBtn.disabled = false;
                stopBtn.classList.remove('opacity-50');
            } catch (err) {
                alert("マイクへのアクセスを許可してください。");
            }
        };

        stopBtn.onclick = () => {
            if(stream) stream.getTracks().forEach(t => t.stop());
            if(audioCtx) audioCtx.close();
            isRunning = false;
            startBtn.disabled = false;
            startBtn.classList.remove('opacity-50');
            stopBtn.disabled = true;
            stopBtn.classList.add('opacity-50');
            resonanceCode.innerText = "---";
        };

        pitchSlider.oninput = () => {
            pitchVal.innerText = parseFloat(pitchSlider.value).toFixed(2);
            // In a real implementation, this would update the PitchShifter grain size
        };

        filterSlider.oninput = () => {
            const val = filterSlider.value;
            filterVal.innerText = `${val}Hz`;
            if(filter) filter.frequency.value = val;
        };

    </script>
</body>
</html>
