<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO WORLD SAGA - キャラクター倉庫</title>
    <style>
        body { background-color: #000; color: #0ff; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; border-bottom: 2px solid #0ff; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 10px; text-align: center; border-radius: 8px; transition: transform 0.2s; }
        .card:hover { transform: scale(1.05); border-color: #0ff; box-shadow: 0 0 10px #0ff; }
        .card img { width: 100%; height: auto; border-radius: 4px; background: #222; }
        .id-label { margin-top: 10px; font-weight: bold; font-size: 1.2rem; }
        .desc { font-size: 0.8rem; color: #ccc; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>NEO WORLD SAGA - CHARACTER WAREHOUSE</h1>
    <p style="text-align: center; opacity: 0.7;">30世紀の「レン」や「バレンタイン」に相応しい義体を選び出せ。</p>
    <div class="grid" id="gallery">
        <!-- JSで画像を自動生成 -->
    </div>

    <script>
        const gallery = document.getElementById('gallery');
        // f001からf100までの画像を生成
        for (let i = 100; i <= 200; i++) {
            const id = 'f' + i.toString().padStart(3, '0');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="images/${id}.png" alt="${id}" onerror="this.parentElement.style.display='none'">
                <div class="id-label">${id}</div>
                <div class="desc">Candidate</div>
            `;
            gallery.appendChild(card);
        }
    </script>
</body>
</html>
