<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCP CHRONICLE: DATA REPOSITORY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            background-color: #0d0208;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; height: 95vh;
        }

        .header {
            border-bottom: 2px solid #00ff41;
            margin-bottom: 20px; padding-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .container {
            display: flex; gap: 20px; flex-grow: 1; overflow: hidden;
        }

        /* Sidebar: List of Logs */
        .sidebar {
            width: 300px;
            border-right: 1px solid #003b00;
            display: flex; flex-direction: column;
            padding-right: 10px;
        }

        #log-list {
            flex-grow: 1; overflow-y: auto;
            list-style: none; padding: 0;
        }

        .log-item {
            padding: 10px; border: 1px solid #003b00; margin-bottom: 5px;
            cursor: pointer; font-size: 0.9em; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
        }
        .log-item:hover { background: #003b00; }
        .log-item.active { border-color: #00ff41; background: rgba(0, 255, 65, 0.1); }

        /* Main: Editor */
        .editor {
            flex-grow: 1; display: flex; flex-direction: column; gap: 10px;
        }

        #entry-title {
            background: transparent; border: 1px solid #003b00; color: #00ff41;
            font-family: 'Share Tech Mono', monospace; font-size: 1.2em; padding: 10px;
        }

        #entry-body {
            flex-grow: 1; background: transparent; border: 1px solid #003b00; color: #00ff41;
            font-family: 'Share Tech Mono', monospace; font-size: 1.1em; padding: 15px;
            resize: none; outline: none;
        }

        .controls {
            display: flex; gap: 10px; margin-bottom: 10px;
        }

        .btn {
            background: transparent; color: #00ff41; border: 1px solid #00ff41;
            padding: 5px 15px; cursor: pointer; font-family: 'Share Tech Mono', monospace;
        }
        .btn:hover { background: #00ff41; color: #000; }

        .tag-select {
            background: #000; color: #00ff41; border: 1px solid #00ff41;
            font-family: 'Share Tech Mono', monospace;
        }

        /* Modal / Tooltips */
        #status-msg { font-size: 0.8em; color: #00ff41; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 1.5em; letter-spacing: 3px;">LCP_CHRONICLE: REPOSITORY</div>
        <div id="status-msg">SYSTEM IDLE</div>
        <a href="arcade.html" class="btn" style="text-decoration:none;">CLOSE</a>
    </div>

    <div class="controls">
        <button class="btn" onclick="createNewEntry()">+ NEW_ENTRY</button>
        <button class="btn" onclick="exportData()">EXPORT_JSON</button>
        <label class="btn" style="cursor:pointer;">
            IMPORT_JSON <input type="file" id="import-file" style="display:none;" onchange="importData(event)">
        </label>
        <button class="btn" style="border-color:#f00; color:#f00;" onclick="clearAllData()">WIPE_LOCAL_STORAGE</button>
    </div>

    <div class="container">
        <div class="sidebar">
            <div style="font-size: 0.8em; margin-bottom: 5px; opacity: 0.5;">ARCHIVE_INDEX</div>
            <ul id="log-list"></ul>
        </div>

        <div class="editor">
            <div style="display:flex; gap:10px;">
                <input type="text" id="entry-title" placeholder="ENTRY TITLE..." style="flex-grow:1;">
                <select id="entry-tag" class="tag-select">
                    <option value="S1">S1: PHILOSOPHY</option>
                    <option value="S2">S2: BUSINESS</option>
                    <option value="S3">S3: VIDEO</option>
                    <option value="S4">S4: TRIAL</option>
                    <option value="S5">S5: REALIZATION</option>
                    <option value="LOG">LOG: GENERAL</option>
                </select>
            </div>
            <textarea id="entry-body" placeholder="START ARCHIVING..."></textarea>
            <div class="controls">
                <button class="btn" onclick="saveEntry()">SAVE_TO_LOCAL</button>
                <button class="btn" style="border-color:#f00; color:#f00;" onclick="deleteEntry()">DELETE_ENTRY</button>
            </div>
        </div>
    </div>

    <script>
        let entries = [];
        let currentId = null;

        const logList = document.getElementById('log-list');
        const entryTitle = document.getElementById('entry-title');
        const entryTag = document.getElementById('entry-tag');
        const entryBody = document.getElementById('entry-body');
        const statusMsg = document.getElementById('status-msg');

        // Initial Load
        function init() {
            const data = localStorage.getItem('lcp_chronicle_data');
            if (data) {
                entries = JSON.parse(data);
            }
            renderList();
        }

        function renderList() {
            logList.innerHTML = "";
            entries.forEach(entry => {
                const li = document.createElement('li');
                li.className = 'log-item' + (currentId === entry.id ? ' active' : '');
                li.innerHTML = `<small>[${entry.tag}]</small> ${entry.title || '(No Title)'}`;
                li.onclick = () => loadEntry(entry.id);
                logList.appendChild(li);
            });
        }

        function createNewEntry() {
            currentId = Date.now();
            entryTitle.value = "";
            entryTag.value = "LOG";
            entryBody.value = "";
            statusMsg.innerText = "NEW ENTRY CREATED";
            renderList();
        }

        function loadEntry(id) {
            const entry = entries.find(e => e.id === id);
            if (entry) {
                currentId = entry.id;
                entryTitle.value = entry.title;
                entryTag.value = entry.tag;
                entryBody.value = entry.body;
                statusMsg.innerText = "ENTRY LOADED";
                renderList();
            }
        }

        function saveEntry() {
            if (!currentId) currentId = Date.now();
            
            const index = entries.findIndex(e => e.id === currentId);
            const entryData = {
                id: currentId,
                title: entryTitle.value,
                tag: entryTag.value,
                body: entryBody.value,
                updated: new Date().toISOString()
            };

            if (index > -1) {
                entries[index] = entryData;
            } else {
                entries.unshift(entryData);
            }

            localStorage.setItem('lcp_chronicle_data', JSON.stringify(entries));
            statusMsg.innerText = "DATA SAVED TO LOCAL_STORAGE";
            renderList();
        }

        function deleteEntry() {
            if (!currentId) return;
            entries = entries.filter(e => e.id !== currentId);
            localStorage.setItem('lcp_chronicle_data', JSON.stringify(entries));
            currentId = null;
            entryTitle.value = "";
            entryBody.value = "";
            statusMsg.innerText = "ENTRY DELETED";
            renderList();
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `lcp_chronicle_backup_${new Date().getTime()}.json`;
            a.click();
            statusMsg.innerText = "DATA EXPORTED TO FILE";
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        entries = imported;
                        localStorage.setItem('lcp_chronicle_data', JSON.stringify(entries));
                        statusMsg.innerText = "DATA IMPORT SUCCESSFUL";
                        renderList();
                    }
                } catch (err) {
                    alert("INVALID JSON FILE");
                }
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            if (confirm("WIPE ALL LOCAL DATA? THIS CANNOT BE UNDONE.")) {
                localStorage.clear();
                entries = [];
                currentId = null;
                renderList();
                statusMsg.innerText = "REPOSITORY WIPED";
            }
        }

        init();
    </script>
</body>
</html>
